# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

before:
  hooks:
    - go mod tidy

gomod:
  proxy: true

builds:
  - binary: "{{ .ProjectName }}"
    env:
      - CGO_ENABLED=0
    main: .
    ldflags: -s -w -X main.Version=v{{ .Version }} -X main.CommitSHA={{ .Commit }} -X main.CommitDate={{ .CommitDate }}
    goos:
      - linux
      - freebsd
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - "386"
      - arm
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm64
      - goos: windows
        goarm: "7"
      - goos: windows
        goarch: "386"
      - goos: freebsd
        goarch: arm64
      - goos: freebsd
        goarch: "386"
      - goos: freebsd
        goarm: "7"

archives:
  - format_overrides:
      - goos: windows
        formats: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    wrap_in_directory: true
    files:
      - README*
      - LICENSE*

checksum:
  name_template: "checksums.txt"

source:
  enabled: true

sboms:
  - artifacts: archive
  - id: source
    artifacts: source

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
        entitlements: '{{ envOrDefault "MACOS_SIGN_ENTITLEMENTS" "" }}'
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true
        timeout: 20m

changelog:
  sort: asc
  use: git
  format: "{{ .SHA }}: {{ .Message }} ({{ with .AuthorUsername }}@{{ . }}{{ else }}{{ .AuthorName }}{{ end }})"
  filters:
    exclude:
      - "^test:"
      - "^chore"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: "Deps"
      regexp: "^.*\\(deps\\)*:+.*$"
      order: 300
    - title: "New!"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 100
    - title: "Fixed"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 200
    - title: "Docs"
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 400
    - title: "Other stuff"
      order: 9999

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

dockers:
  - image_templates:
      - "docker.io/nicsdp/{{ .ProjectName }}:v{{ .Version }}-amd64"
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-amd64"
    goarch: amd64
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.description={{ .ProjectName }}
      - --label=org.opencontainers.image.source={{ .GitURL }}
      - --label=org.opencontainers.image.version=v{{ .Version }}
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.licenses=MIT
    dockerfile: Dockerfile
    use: buildx
  - image_templates:
      - "docker.io/nicsdp/{{ .ProjectName }}:v{{ .Version }}-arm64"
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-arm64"
    goarch: arm64
    build_flag_templates:
      - --platform=linux/arm64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.description={{ .ProjectName }}
      - --label=org.opencontainers.image.source={{ .GitURL }}
      - --label=org.opencontainers.image.version=v{{ .Version }}
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.licenses=MIT
    dockerfile: Dockerfile
    use: buildx
  - image_templates:
      - "docker.io/nicsdp/{{ .ProjectName }}:v{{ .Version }}-armv7"
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-armv7"
    goarch: arm
    goarm: "7"
    build_flag_templates:
      - --platform=linux/arm/v7
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.description={{ .ProjectName }}
      - --label=org.opencontainers.image.source={{ .GitURL }}
      - --label=org.opencontainers.image.version=v{{ .Version }}
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.licenses=MIT
    dockerfile: Dockerfile
    use: buildx

docker_manifests:
  - name_template: "docker.io/nicsdp/{{ .ProjectName }}:latest"
    image_templates:
      - "docker.io/nicsdp/{{ .ProjectName }}:v{{ .Version }}-amd64"
      - "docker.io/nicsdp/{{ .ProjectName }}:v{{ .Version }}-arm64"
      - "docker.io/nicsdp/{{ .ProjectName }}:v{{ .Version }}-armv7"
  - name_template: "ghcr.io/nics-dp/{{ .ProjectName }}:latest"
    image_templates:
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-amd64"
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-arm64"
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-armv7"
  - name_template: "docker.io/nicsdp/{{ .ProjectName }}:v{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "docker.io/nicsdp/{{ .ProjectName }}:v{{ .Version }}-amd64"
      - "docker.io/nicsdp/{{ .ProjectName }}:v{{ .Version }}-arm64"
      - "docker.io/nicsdp/{{ .ProjectName }}:v{{ .Version }}-armv7"
  - name_template: "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-amd64"
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-arm64"
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-armv7"
  - name_template: "docker.io/nicsdp/{{ .ProjectName }}:v{{ .Version }}"
    image_templates:
      - "docker.io/nicsdp/{{ .ProjectName }}:v{{ .Version }}-amd64"
      - "docker.io/nicsdp/{{ .ProjectName }}:v{{ .Version }}-arm64"
      - "docker.io/nicsdp/{{ .ProjectName }}:v{{ .Version }}-armv7"
  - name_template: "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}"
    image_templates:
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-amd64"
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-arm64"
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-armv7"

docker_signs:
  - cmd: cosign
    artifacts: manifests
    output: true
    args:
      - "sign"
      - "${artifact}"
      - "--yes"

git:
  tag_sort: -version:refname

release:
  prerelease: auto
