# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

name: Feature Request
description: Suggest a feature you miss.
type: feature
body:
  - type: input
    id: tool
    attributes:
      label: Tool Name
      description: Which tool or binary is this for?

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature you'd like.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why do you need this feature? What problem does it solve?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.
