# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: SBOM Source

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
        description: "Project name for artifact naming (e.g., dcf-platform)"
      scan_path:
        required: false
        type: string
        default: "."
        description: "Directory to scan for dependencies"
      ref:
        required: false
        type: string
        default: ""
        description: "Git ref to checkout (defaults to event ref)"
      snapshot:
        required: false
        type: boolean
        default: false
        description: "Snapshot mode (skip release upload and dependency snapshot)"
      runs_on:
        required: false
        type: string
        default: '"ubuntu-latest"'
        description: 'Runner as JSON (e.g., ''"ubuntu-latest"'' or ''{"group":"releasers"}'')'

jobs:
  sbom-source:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    permissions:
      actions: read
      contents: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Compute version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          SNAPSHOT: ${{ inputs.snapshot }}
        run: |
          if [[ "$SNAPSHOT" == "true" ]]; then
            echo "version=0.0.0-snapshot+$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          else
            TAG="${RELEASE_TAG:-$GITHUB_REF_NAME}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "version_tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate SBOM (CycloneDX JSON 1.6)
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          path: ${{ inputs.scan_path }}
          format: cyclonedx-json
          output-file: sbom-source.cdx.json
          dependency-snapshot: ${{ !inputs.snapshot }}
          upload-artifact: false

      - name: Set up Go (for tooling)
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable
          cache: false

      - name: Enrich SBOM with parlay
        run: |
          go install github.com/snyk/parlay@v0.11.0
          parlay ecosystems enrich sbom-source.cdx.json > enriched-source.cdx.json

      - name: Scan SBOM with Trivy (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: sbom
          scan-ref: enriched-source.cdx.json
          format: sarif
          output: trivy-source.sarif

      - name: Fix Trivy SARIF empty artifact locations
        run: |
          jq '(.runs[].results[].locations[].physicalLocation.artifactLocation | select(.uri == "")) .uri = "sbom-source.cdx.json"' \
            trivy-source.sarif > trivy-source-fixed.sarif
          mv trivy-source-fixed.sarif trivy-source.sarif

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4.33.0
        with:
          sarif_file: trivy-source.sarif
          category: trivy-source

      - name: Scan SBOM with Trivy (JSON)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: sbom
          scan-ref: enriched-source.cdx.json
          format: json
          output: trivy-source.json

      - name: Scan SBOM with Grype (SARIF)
        if: always()
        id: grype-sarif
        uses: anchore/scan-action@7037fa011853d5a11690026fb85feee79f4c946c # v7.3.2
        with:
          sbom: sbom-source.cdx.json
          output-format: sarif
          severity-cutoff: high

      - name: Upload Grype SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4.33.0
        with:
          sarif_file: ${{ steps.grype-sarif.outputs.sarif }}
          category: grype-source

      - name: Scan SBOM with Grype (JSON)
        id: grype-json
        uses: anchore/scan-action@7037fa011853d5a11690026fb85feee79f4c946c # v7.3.2
        with:
          sbom: sbom-source.cdx.json
          output-format: json
          severity-cutoff: high

      - name: Prepare release assets
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PROJECT_NAME: ${{ inputs.project_name }}
          GRYPE_JSON: ${{ steps.grype-json.outputs.json }}
        run: |
          mv enriched-source.cdx.json "${PROJECT_NAME}_${VERSION}_source.cdx.json"
          mv trivy-source.json "${PROJECT_NAME}_${VERSION}_source.trivy.json"
          mv "$GRYPE_JSON" "${PROJECT_NAME}_${VERSION}_source.grype.json"

      - name: Upload to GitHub Release
        if: ${{ !inputs.snapshot }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: ${{ steps.version.outputs.version_tag }}
          VERSION: ${{ steps.version.outputs.version }}
          PROJECT_NAME: ${{ inputs.project_name }}
        run: |
          gh release upload "$VERSION_TAG" \
            "${PROJECT_NAME}_${VERSION}_source.cdx.json" \
            "${PROJECT_NAME}_${VERSION}_source.trivy.json" \
            "${PROJECT_NAME}_${VERSION}_source.grype.json" \
            --clobber
