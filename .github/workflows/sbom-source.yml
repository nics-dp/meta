# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: SBOM Source

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
        description: "Project name for artifact naming (e.g., dcf-platform)"
      scan_path:
        required: false
        type: string
        default: "."
        description: "Directory to scan for dependencies"
      ref:
        required: false
        type: string
        default: ""
        description: "Git ref to checkout (defaults to event ref)"
      snapshot:
        required: false
        type: boolean
        default: false
        description: "Snapshot mode (skip release upload and dependency snapshot)"
      runs_on:
        required: false
        type: string
        default: '{"group":"releasers"}'
        description: 'Runner as JSON (e.g., ''"ubuntu-latest"'' or ''{"group":"releasers"}'')'
    secrets:
      gh_pat:
        required: false

jobs:
  sbom-source:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    permissions:
      contents: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Compute version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ "${{ inputs.snapshot }}" == "true" ]]; then
            echo "version=0.0.0-snapshot+$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          else
            TAG="${RELEASE_TAG:-$GITHUB_REF_NAME}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "version_tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate SBOM (CycloneDX JSON 1.6)
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          path: ${{ inputs.scan_path }}
          format: cyclonedx-json@1.6
          output-file: sbom-source.cdx.json
          dependency-snapshot: ${{ !inputs.snapshot }}
          upload-artifact: false

      - name: Set up Go (for tooling)
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable
          cache: false

      - name: Enrich SBOM with parlay
        run: |
          go install github.com/snyk/parlay@latest
          parlay ecosystems enrich sbom-source.cdx.json > enriched-source.cdx.json

      - name: Scan SBOM with Trivy (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: sbom
          input: enriched-source.cdx.json
          format: sarif
          output: trivy-source.sarif

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@fb0994ef1c058010acf1efccff928b0a83b1ed54 # v4.32.6
        with:
          sarif_file: trivy-source.sarif
          category: trivy-source

      - name: Scan SBOM with Trivy (JSON)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: sbom
          input: enriched-source.cdx.json
          format: json
          output: trivy-source.json

      - name: Scan SBOM with Grype (SARIF)
        id: grype-sarif
        uses: anchore/scan-action@7037fa011853d5a11690026fb85feee79f4c946c # v7.3.2
        with:
          sbom: enriched-source.cdx.json
          output-format: sarif

      - name: Upload Grype SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@fb0994ef1c058010acf1efccff928b0a83b1ed54 # v4.32.6
        with:
          sarif_file: ${{ steps.grype-sarif.outputs.sarif }}
          category: grype-source

      - name: Scan SBOM with Grype (JSON)
        id: grype-json
        uses: anchore/scan-action@7037fa011853d5a11690026fb85feee79f4c946c # v7.3.2
        with:
          sbom: enriched-source.cdx.json
          output-format: json

      - name: Prepare release assets
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mv enriched-source.cdx.json "${{ inputs.project_name }}_${VERSION}_source.cdx.json"
          mv trivy-source.json "${{ inputs.project_name }}_${VERSION}_source.trivy.json"
          mv "${{ steps.grype-json.outputs.json }}" "${{ inputs.project_name }}_${VERSION}_source.grype.json"

      - name: Upload to GitHub Release
        if: ${{ !inputs.snapshot }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: ${{ steps.version.outputs.version_tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release upload "$VERSION_TAG" \
            "${{ inputs.project_name }}_${VERSION}_source.cdx.json" \
            "${{ inputs.project_name }}_${VERSION}_source.trivy.json" \
            "${{ inputs.project_name }}_${VERSION}_source.grype.json" \
            --clobber
