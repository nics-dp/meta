# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: codeql-sync
on:
  workflow_call:
    inputs:
      repo_name:
        description: The repository name, without the org prefix.
        required: true
        type: string
    secrets:
      gh_token:
        required: true
  workflow_dispatch: # allows manual triggering
    inputs:
      repo_name:
        description: The repository name, without the org prefix.
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository_owner }}/${{ inputs.repo_name }}
          path: ${{ github.repository_owner }}/${{ inputs.repo_name }}
          token: ${{ secrets.gh_token || secrets.PERSONAL_ACCESS_TOKEN }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository_owner }}/meta
          path: ${{ github.repository_owner }}/meta
          token: ${{ secrets.gh_token || secrets.PERSONAL_ACCESS_TOKEN }}

      - run: |
          CODEQL_FILE="${{ github.repository_owner }}/meta/codeqls/${{ inputs.repo_name }}.yml"
          if [ -f "$CODEQL_FILE" ]; then
            mkdir -p "${{ github.repository_owner }}/${{ inputs.repo_name }}/.github/workflows"
            cp "$CODEQL_FILE" "${{ github.repository_owner }}/${{ inputs.repo_name }}/.github/workflows/codeql.yml"
          else
            echo "::warning::No codeql config found for ${{ inputs.repo_name }}"
          fi

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: "ci: sync codeql config"
          title: "ci: sync codeql config"
          body: |
            This is an automated pull request to sync the CodeQL config with the meta repository.
          branch: "ci/sync-codeql-config"
          delete-branch: true
          path: "${{ github.repository_owner }}/${{ inputs.repo_name }}"
          token: ${{ secrets.gh_token || secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Check outputs
        if: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"
