# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: cron

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  # All DCF repos (commitlintrc)
  ALL_REPOS: '["dcf-platform","dcf-access","dcf-service","dcf-access-cli","dcf-platform-cli","dcf-access-web","dcf-platform-web","libdcf","otel-bundle","ZenQuery","patroni","dcf-synthetic-data-cli"]'
  # Go repos only (golangci-lint)
  GO_REPOS: '["dcf-platform","dcf-access","dcf-service","dcf-access-cli","dcf-platform-cli","libdcf","otel-bundle","ZenQuery"]'
  # Web repos only (prettier, eslint, vitest, knip, lighthouserc)
  WEB_REPOS: '["dcf-access-web","dcf-platform-web"]'
  # Python repos only
  PYTHON_REPOS: '["dcf-synthetic-data-cli"]'
  # Repos with per-repo CodeQL configs in configs/codeqls/
  CODEQL_REPOS: '["dcf-platform","dcf-access","dcf-service","dcf-access-cli","dcf-platform-cli","dcf-access-web","dcf-platform-web","libdcf","otel-bundle","ZenQuery","dcf-synthetic-data-cli"]'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      all_repos: ${{ steps.repos.outputs.all }}
      go_repos: ${{ steps.repos.outputs.go }}
      web_repos: ${{ steps.repos.outputs.web }}
      python_repos: ${{ steps.repos.outputs.python }}
      codeql_repos: ${{ steps.repos.outputs.codeql }}
    steps:
      - id: repos
        run: |
          {
            echo "all=$ALL_REPOS"
            echo "go=$GO_REPOS"
            echo "web=$WEB_REPOS"
            echo "python=$PYTHON_REPOS"
            echo "codeql=$CODEQL_REPOS"
          } >> "$GITHUB_OUTPUT"

  sync-codeql:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.setup.outputs.codeql_repos) }}
    uses: ./.github/workflows/sync-codeql.yml
    with:
      repo_name: ${{ matrix.repo }}
    secrets:
      gh_token: ${{ secrets.GH_PAT_SYNC_NICSDP }}

  sync-commitlintrc:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.setup.outputs.all_repos) }}
    uses: ./.github/workflows/sync-commitlintrc.yml
    with:
      repo_name: ${{ matrix.repo }}
    secrets:
      gh_token: ${{ secrets.GH_PAT_SYNC_NICSDP }}

  sync-golangci:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.setup.outputs.go_repos) }}
    uses: ./.github/workflows/sync-golangci.yml
    with:
      repo_name: ${{ matrix.repo }}
    secrets:
      gh_token: ${{ secrets.GH_PAT_SYNC_NICSDP }}

  sync-prettier:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.setup.outputs.web_repos) }}
    uses: ./.github/workflows/sync-prettier.yml
    with:
      repo_name: ${{ matrix.repo }}
    secrets:
      gh_token: ${{ secrets.GH_PAT_SYNC_NICSDP }}

  sync-eslint-config:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.setup.outputs.web_repos) }}
    uses: ./.github/workflows/sync-eslint-config.yml
    with:
      repo_name: ${{ matrix.repo }}
    secrets:
      gh_token: ${{ secrets.GH_PAT_SYNC_NICSDP }}

  sync-vitest-config:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.setup.outputs.web_repos) }}
    uses: ./.github/workflows/sync-vitest-config.yml
    with:
      repo_name: ${{ matrix.repo }}
    secrets:
      gh_token: ${{ secrets.GH_PAT_SYNC_NICSDP }}

  sync-knip:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.setup.outputs.web_repos) }}
    uses: ./.github/workflows/sync-knip.yml
    with:
      repo_name: ${{ matrix.repo }}
    secrets:
      gh_token: ${{ secrets.GH_PAT_SYNC_NICSDP }}

  sync-lighthouserc:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.setup.outputs.web_repos) }}
    uses: ./.github/workflows/sync-lighthouserc.yml
    with:
      repo_name: ${{ matrix.repo }}
    secrets:
      gh_token: ${{ secrets.GH_PAT_SYNC_NICSDP }}
