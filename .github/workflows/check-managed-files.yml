# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: check-managed-files

on:
  workflow_call:
    inputs:
      managed_files:
        description: Comma-separated list of centrally-managed file paths.
        required: false
        type: string
        default: ".github/workflows/codeql.yml,.commitlintrc.yml,.golangci.yml,renovate.json,.prettierrc.json,.prettierignore,eslint.config.js,vitest.config.ts,knip.json,lighthouserc.json"

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    # Only check on PRs, skip sync PRs from meta repo
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'ci/sync-')
    runs-on: ubuntu-latest
    steps:
      - name: Check for managed file changes
        env:
          GH_TOKEN: ${{ github.token }}
          MANAGED_FILES: ${{ inputs.managed_files }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          changed=$(gh api --paginate "repos/${REPO}/pulls/${PR_NUMBER}/files" --jq '.[].filename')

          IFS=',' read -ra files <<< "$MANAGED_FILES"
          found=()
          for mf in "${files[@]}"; do
            mf=$(echo "$mf" | xargs)
            if echo "$changed" | grep -qx "$mf"; then
              found+=("$mf")
            fi
          done

          if [ ${#found[@]} -gt 0 ]; then
            echo "::error::The following files are centrally managed by nics-dp/meta and must not be modified directly:"
            for f in "${found[@]}"; do
              echo "::error::  - $f"
            done
            echo "::error::Please update the source files in the meta repo; changes are synced automatically."
            exit 1
          fi

          echo "✓ No managed files were modified."
