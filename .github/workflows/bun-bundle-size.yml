# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: bun-bundle-size

on:
  workflow_call:
    inputs:
      build_command:
        required: false
        type: string
        default: "bun run build"
        description: "Build command to run before size check"

permissions:
  contents: read

jobs:
  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44e0a0e05bf0299db72d5 # v2.0.3
      - run: bun install --frozen-lockfile

      - name: Build
        env:
          BUILD_COMMAND: ${{ inputs.build_command }}
        run: bash -euo pipefail -lc "$BUILD_COMMAND"

      - name: Check bundle size
        run: bunx size-limit
