# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: bun-bundle-size

on:
  workflow_call:
    inputs:
      task:
        required: false
        type: string
        default: "bundle-size"
        description: "mise task to run"
      command:
        required: false
        type: string
        default: ""
        description: "Optional shell command override"
    secrets:
      gh_pat:
        required: false

env:
  MISE_AUTO_INSTALL: "false"

permissions:
  contents: read

jobs:
  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          token: ${{ secrets.gh_pat }}

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          cache: true
          experimental: true
          log_level: "info"
          install: false

      - name: Install required tools
        run: mise install bun

      - name: Initialize environment
        run: mise run init

      - name: Run bundle size check
        env:
          TASK: ${{ inputs.task }}
          COMMAND: ${{ inputs.command }}
        run: |
          if [ -n "$COMMAND" ]; then
            bash -euo pipefail -lc "$COMMAND"
          else
            mise run "$TASK"
          fi
