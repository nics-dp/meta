# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI Test

on:
  workflow_call:
    inputs:
      mise_version:
        required: false
        type: string
        default: ""
        description: "Pin mise version (empty = latest)"
      go_private_full:
        required: false
        type: boolean
        default: false
        description: "Set GOPRIVATE/GONOSUMDB for repos importing nics-dp private modules"
      test_command:
        required: false
        type: string
        default: "mise run test"
        description: "Command to run unit tests (must produce pkgCoverage.out)"
    secrets:
      gh_pat:
        required: false

permissions:
  contents: read

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    env:
      GH_PAT: ${{ secrets.gh_pat }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          version: ${{ inputs.mise_version || '' }}
          cache: true
          experimental: true
          log_level: "info"

      - name: Configure private git repository
        if: env.GH_PAT != ''
        run: |
          if [ "${{ inputs.go_private_full }}" = "true" ]; then
            go env -w GOPRIVATE=github.com/nics-dp
            go env -w GONOSUMDB=github.com/nics-dp
            git config --global url."https://${{ env.GH_PAT }}@github.com/".insteadOf "git@github.com:"
          fi
          git config --global url."https://${{ env.GH_PAT }}@github.com".insteadOf "https://github.com"

      - name: Prepare environment
        run: mise run prepare

      - name: Run unit tests
        run: ${{ inputs.test_command }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-data
          path: pkgCoverage.out
          retention-days: 1
