# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI Notify

on:
  workflow_call:
    inputs:
      stage_name:
        required: true
        type: string
        description: "Name of the failed stage (e.g., Lint, Security Scan, Unit Test)"
      result:
        required: false
        type: string
        default: "failure"
        description: "Result type: failure or success"
      stages:
        required: false
        type: string
        default: ""
        description: "Stages summary for success notification (e.g., Lint -> Security -> Unit Test)"
    secrets:
      google_chat_webhook:
        required: false

permissions:
  contents: read

env:
  GOOGLE_CHAT_WEBHOOK: ${{ secrets.google_chat_webhook }}
  REPOSITORY: ${{ github.repository }}
  EVENT_NAME: ${{ github.event_name }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PR_TITLE: ${{ github.event.pull_request.title }}
  RELEASE_TAG: ${{ github.event.release.tag_name }}
  REF_NAME: ${{ github.ref_name }}
  ACTOR: ${{ github.actor }}
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  notify:
    name: Notify
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        run: |
          if [ -z "$GOOGLE_CHAT_WEBHOOK" ]; then exit 0; fi

          STAGE="${{ inputs.stage_name }}"
          RESULT="${{ inputs.result }}"

          if [ "$RESULT" = "success" ]; then
            SUFFIX="CI Passed"
            BUTTON_TEXT="VIEW DETAILS"
          else
            SUFFIX="$STAGE Failed"
            BUTTON_TEXT="VIEW LOGS"
          fi

          case "$EVENT_NAME" in
            pull_request) TITLE="PR #$PR_NUMBER: $PR_TITLE: $SUFFIX" ;;
            push)         TITLE="Push to $REF_NAME: $SUFFIX" ;;
            release)      TITLE="Release $RELEASE_TAG: $SUFFIX" ;;
            *)            TITLE="$SUFFIX" ;;
          esac

          STAGES="${{ inputs.stages }}"
          if [ -n "$STAGES" ]; then
            PAYLOAD=$(jq -n --arg t "$TITLE" --arg a "$ACTOR" --arg r "$REPOSITORY" --arg b "$REF_NAME" --arg s "$STAGES" --arg u "$RUN_URL" --arg bt "$BUTTON_TEXT" \
              '{cards:[{header:{title:$t},sections:[{widgets:[{keyValue:{topLabel:"Triggered by",content:$a,icon:"PERSON"}},{keyValue:{topLabel:"Repository",content:$r}},{keyValue:{topLabel:"Branch",content:$b}},{keyValue:{topLabel:"Stages",content:$s}}]},{widgets:[{buttons:[{textButton:{text:$bt,onClick:{openLink:{url:$u}}}}]}]}]}]}')
          else
            PAYLOAD=$(jq -n --arg t "$TITLE" --arg a "$ACTOR" --arg r "$REPOSITORY" --arg b "$REF_NAME" --arg u "$RUN_URL" --arg bt "$BUTTON_TEXT" \
              '{cards:[{header:{title:$t},sections:[{widgets:[{keyValue:{topLabel:"Triggered by",content:$a,icon:"PERSON"}},{keyValue:{topLabel:"Repository",content:$r}},{keyValue:{topLabel:"Branch",content:$b}}]},{widgets:[{buttons:[{textButton:{text:$bt,onClick:{openLink:{url:$u}}}}]}]}]}]}')
          fi

          curl -s -X POST "$GOOGLE_CHAT_WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"
