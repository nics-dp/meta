# .github/workflows/notify-google-chat.yml
name: Notify Google Chat
permissions: {}

on:
  workflow_call:
  pull_request:
    types: [opened, closed, reopened]
  push:
    branches: [main, master]
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Google Chat
        env:
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_ACTION: ${{ github.event.action }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_AUTHOR: ${{ github.event.release.author.login }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMPARE_URL: ${{ github.event.compare }}
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            # Build PR message using Google Chat Cards for rich formatting
            # Determine PR status and icon
            if [ "$PR_MERGED" = "true" ]; then
              PR_STATUS="Merged"
              PR_ICON="✅"
            elif [ "$PR_ACTION" = "closed" ]; then
              PR_STATUS="Closed"
              PR_ICON="❌"
            elif [ "$PR_ACTION" = "reopened" ]; then
              PR_STATUS="Reopened"
              PR_ICON="🔄"
            else
              PR_STATUS="Opened"
              PR_ICON="🔀"
            fi

            # Build card header
            CARD_TITLE="$PR_ICON PR #$PR_NUMBER: $PR_TITLE"

            # Prepare PR body with preserved formatting
            # Limit to 500 characters for reasonable message size
            if [ -n "$PR_BODY" ]; then
              if [ ${#PR_BODY} -gt 500 ]; then
                # Truncate to 500 chars with UTF-8 safety
                FORMATTED_BODY=$(echo "$PR_BODY" | head -c 500 | iconv -c -t UTF-8)
                FORMATTED_BODY="$FORMATTED_BODY...\n\n<i>See full description at the link below</i>"
              else
                FORMATTED_BODY="$PR_BODY"
              fi
            else
              FORMATTED_BODY="<i>No description provided</i>"
            fi

            # Build JSON payload using jq for proper escaping
            if command -v jq >/dev/null 2>&1; then
              # Create card-based message with sections
              JSON_PAYLOAD=$(jq -n \
                --arg title "$CARD_TITLE" \
                --arg author "$PR_AUTHOR" \
                --arg repo "$REPOSITORY" \
                --arg status "$PR_STATUS" \
                --arg body "$FORMATTED_BODY" \
                --arg base "$PR_BASE_BRANCH" \
                --arg head "$PR_HEAD_BRANCH" \
                --arg url "$PR_URL" \
                '{
                  cards: [{
                    header: {
                      title: $title
                    },
                    sections: [
                      {
                        widgets: [
                          {
                            keyValue: {
                              topLabel: "Author",
                              content: $author,
                              icon: "PERSON"
                            }
                          },
                          {
                            keyValue: {
                              topLabel: "Repository",
                              content: $repo
                            }
                          },
                          {
                            keyValue: {
                              topLabel: "Status",
                              content: $status
                            }
                          },
                          {
                            keyValue: {
                              topLabel: "Branch",
                              content: ($head + " → " + $base)
                            }
                          }
                        ]
                      },
                      {
                        header: "Description",
                        widgets: [{
                          textParagraph: {
                            text: $body
                          }
                        }]
                      },
                      {
                        widgets: [{
                          buttons: [{
                            textButton: {
                              text: "VIEW ON GITHUB",
                              onClick: {
                                openLink: {
                                  url: $url
                                }
                              }
                            }
                          }]
                        }]
                      }
                    ]
                  }]
                }')
            else
              # Fallback to simple text format if jq not available
              MESSAGE="$CARD_TITLE"$'\n'
              MESSAGE="$MESSAGE"$'\n'"👤 Author: $PR_AUTHOR"$'\n'
              MESSAGE="$MESSAGE""📦 Repository: $REPOSITORY"$'\n'
              MESSAGE="$MESSAGE""📊 Status: $PR_STATUS"$'\n'
              MESSAGE="$MESSAGE""🌿 Branch: $PR_HEAD_BRANCH → $PR_BASE_BRANCH"$'\n'
              MESSAGE="$MESSAGE"$'\n'"📝 Description:"$'\n'"$FORMATTED_BODY"$'\n\n'"🔗 $PR_URL"
              # Properly escape for JSON - handle actual newlines
              ESCAPED_MESSAGE=$(echo "$MESSAGE" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g' | sed 's/\\/\\\\/g')
              JSON_PAYLOAD="{\"text\": \"$ESCAPED_MESSAGE\"}"
            fi
          elif [ "$EVENT_NAME" = "release" ]; then
            # Build release message using Google Chat Cards for rich formatting
            RELEASE_TYPE="Release"
            RELEASE_ICON="🚀"
            if [ "$RELEASE_PRERELEASE" = "true" ]; then
              RELEASE_TYPE="Pre-release"
              RELEASE_ICON="🧪"
            fi

            # Build card header
            CARD_TITLE="$RELEASE_ICON $RELEASE_TYPE: $RELEASE_TAG"
            if [ -n "$RELEASE_NAME" ]; then
              CARD_TITLE="$CARD_TITLE - $RELEASE_NAME"
            fi

            # Prepare release body with preserved formatting
            # Limit to 1000 characters for reasonable message size
            if [ -n "$RELEASE_BODY" ]; then
              if [ ${#RELEASE_BODY} -gt 1000 ]; then
                # Truncate to 1000 chars with UTF-8 safety
                FORMATTED_BODY=$(echo "$RELEASE_BODY" | head -c 1000 | iconv -c -t UTF-8)
                FORMATTED_BODY="$FORMATTED_BODY...\n\n<i>See full release notes at the link below</i>"
              else
                FORMATTED_BODY="$RELEASE_BODY"
              fi
            else
              FORMATTED_BODY="<i>No release notes provided</i>"
            fi

            # Build JSON payload using jq for proper escaping
            if command -v jq >/dev/null 2>&1; then
              # Create card-based message with sections
              JSON_PAYLOAD=$(jq -n \
                --arg title "$CARD_TITLE" \
                --arg author "$RELEASE_AUTHOR" \
                --arg repo "$REPOSITORY" \
                --arg body "$FORMATTED_BODY" \
                --arg url "$RELEASE_URL" \
                '{
                  cards: [{
                    header: {
                      title: $title
                    },
                    sections: [
                      {
                        widgets: [
                          (if $author != "" then {
                            keyValue: {
                              topLabel: "Author",
                              content: $author,
                              icon: "PERSON"
                            }
                          } else empty end),
                          {
                            keyValue: {
                              topLabel: "Repository",
                              content: $repo
                            }
                          }
                        ]
                      },
                      {
                        header: "Release Notes",
                        widgets: [{
                          textParagraph: {
                            text: $body
                          }
                        }]
                      },
                      {
                        widgets: [{
                          buttons: [{
                            textButton: {
                              text: "VIEW ON GITHUB",
                              onClick: {
                                openLink: {
                                  url: $url
                                }
                              }
                            }
                          }]
                        }]
                      }
                    ]
                  }]
                }')
            else
              # Fallback to simple text format if jq not available
              # Build message with newlines using $'\n' syntax
              MESSAGE="$CARD_TITLE"$'\n'
              if [ -n "$RELEASE_AUTHOR" ]; then
                MESSAGE="$MESSAGE"$'\n'"👤 Author: $RELEASE_AUTHOR"$'\n'
              fi
              MESSAGE="$MESSAGE""📦 Repository: $REPOSITORY"$'\n'
              MESSAGE="$MESSAGE"$'\n'"📝 Release Notes:"$'\n'"$FORMATTED_BODY"$'\n\n'"🔗 $RELEASE_URL"
              # Properly escape for JSON - handle actual newlines
              ESCAPED_MESSAGE=$(echo "$MESSAGE" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g' | sed 's/\\/\\\\/g')
              JSON_PAYLOAD="{\"text\": \"$ESCAPED_MESSAGE\"}"
            fi
          else
            # Build push message using Google Chat Cards for rich formatting
            CARD_TITLE="📦 Push to 🌿 $REF_NAME"

            # Get commit message (first line only for header)
            if [ -n "$COMMIT_MESSAGE" ]; then
              COMMIT_TITLE=$(echo "$COMMIT_MESSAGE" | head -n 1)
              COMMIT_BODY=$(echo "$COMMIT_MESSAGE" | tail -n +2 | sed '/^$/d')
              
              # Limit commit body to 300 characters
              if [ -n "$COMMIT_BODY" ] && [ ${#COMMIT_BODY} -gt 300 ]; then
                COMMIT_BODY=$(echo "$COMMIT_BODY" | head -c 300 | iconv -c -t UTF-8)
                COMMIT_BODY="$COMMIT_BODY...\n\n<i>See full changes at the link below</i>"
              fi
            else
              COMMIT_TITLE="No commit message"
              COMMIT_BODY="<i>No additional details</i>"
            fi

            # Build JSON payload using jq for proper escaping
            if command -v jq >/dev/null 2>&1; then
              # Create card-based message with sections
              COMMIT_HEADER="Commit: $COMMIT_TITLE"
              JSON_PAYLOAD=$(jq -n \
                --arg title "$CARD_TITLE" \
                --arg actor "$ACTOR" \
                --arg repo "$REPOSITORY" \
                --arg branch "$REF_NAME" \
                --arg commit_header "$COMMIT_HEADER" \
                --arg commit_body "$COMMIT_BODY" \
                --arg compare_url "$COMPARE_URL" \
                '{
                  cards: [{
                    header: {
                      title: $title
                    },
                    sections: [
                      {
                        widgets: [
                          {
                            keyValue: {
                              topLabel: "Author",
                              content: $actor,
                              icon: "PERSON"
                            }
                          },
                          {
                            keyValue: {
                              topLabel: "Repository",
                              content: $repo
                            }
                          },
                          {
                            keyValue: {
                              topLabel: "Branch",
                              content: $branch
                            }
                          }
                        ]
                      },
                      {
                        header: $commit_header,
                        widgets: ([
                          (if $commit_body != "" and $commit_body != "<i>No additional details</i>" then {
                            textParagraph: {
                              text: $commit_body
                            }
                          } else empty end)
                        ] + [{
                          buttons: [{
                            textButton: {
                              text: "VIEW CHANGES",
                              onClick: {
                                openLink: {
                                  url: $compare_url
                                }
                              }
                            }
                          }]
                        }])
                      }
                    ]
                  }]
                }')
            else
              # Fallback to simple text format if jq not available
              MESSAGE="$CARD_TITLE"$'\n'
              MESSAGE="$MESSAGE"$'\n'"👤 Author: $ACTOR"$'\n'
              MESSAGE="$MESSAGE""📦 Repository: $REPOSITORY"$'\n'
              MESSAGE="$MESSAGE""🌿 Branch: $REF_NAME"$'\n'
              MESSAGE="$MESSAGE"$'\n'"📝 Commit: $COMMIT_TITLE"$'\n'
              if [ -n "$COMMIT_BODY" ]; then
                MESSAGE="$MESSAGE""$COMMIT_BODY"$'\n'
              fi
              MESSAGE="$MESSAGE"$'\n'"🔗 $COMPARE_URL"
              # Properly escape for JSON - handle actual newlines
              ESCAPED_MESSAGE=$(echo "$MESSAGE" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g' | sed 's/\\/\\\\/g')
              JSON_PAYLOAD="{\"text\": \"$ESCAPED_MESSAGE\"}"
            fi
          fi

          # Send the notification
          curl -X POST "$GOOGLE_CHAT_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD"
