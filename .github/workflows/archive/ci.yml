# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI Pipeline

on:
  workflow_call:
    inputs:
      mise_version:
        required: false
        type: string
        default: ""
        description: "Pin mise version (empty = latest)"
      go_private_full:
        required: false
        type: boolean
        default: false
        description: "Set GOPRIVATE/GONOSUMDB for repos importing nics-dp private modules"
      test_command:
        required: false
        type: string
        default: "mise run test"
        description: "Command to run unit tests (must produce pkgCoverage.out)"
      report_command:
        required: false
        type: string
        default: "mise run report"
        description: "Command to generate coverage report"
      run_report:
        required: false
        type: boolean
        default: true
        description: "Whether to run the report stage on release"
    secrets:
      gh_pat:
        required: false
      google_chat_webhook:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GH_PAT: ${{ secrets.gh_pat }}
  GOOGLE_CHAT_WEBHOOK: ${{ secrets.google_chat_webhook }}
  REPOSITORY: ${{ github.repository }}
  EVENT_NAME: ${{ github.event_name }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PR_TITLE: ${{ github.event.pull_request.title }}
  RELEASE_TAG: ${{ github.event.release.tag_name }}
  REF_NAME: ${{ github.ref_name }}
  ACTOR: ${{ github.actor }}
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          version: ${{ inputs.mise_version || '' }}
          cache: true
          experimental: true
          log_level: "info"

      - name: Configure private git repository
        if: env.GH_PAT != ''
        run: |
          if [ "${{ inputs.go_private_full }}" = "true" ]; then
            go env -w GOPRIVATE=github.com/nics-dp
            go env -w GONOSUMDB=github.com/nics-dp
            git config --global url."https://${{ env.GH_PAT }}@github.com/".insteadOf "git@github.com:"
          fi
          git config --global url."https://${{ env.GH_PAT }}@github.com".insteadOf "https://github.com"

      - name: Prepare environment
        run: mise run prepare

      - name: Run lint
        run: mise run lint

      - name: Notify on failure
        if: failure()
        run: |
          if [ -z "$GOOGLE_CHAT_WEBHOOK" ]; then exit 0; fi
          case "$EVENT_NAME" in
            pull_request) TITLE="PR #$PR_NUMBER: $PR_TITLE: Lint Failed" ;;
            push)         TITLE="Push to $REF_NAME: Lint Failed" ;;
            release)      TITLE="Release $RELEASE_TAG: Lint Failed" ;;
            *)            TITLE="Lint Failed" ;;
          esac
          PAYLOAD=$(jq -n --arg t "$TITLE" --arg a "$ACTOR" --arg r "$REPOSITORY" --arg b "$REF_NAME" --arg u "$RUN_URL" \
            '{cards:[{header:{title:$t},sections:[{widgets:[{keyValue:{topLabel:"Triggered by",content:$a,icon:"PERSON"}},{keyValue:{topLabel:"Repository",content:$r}},{keyValue:{topLabel:"Branch",content:$b}}]},{widgets:[{buttons:[{textButton:{text:"VIEW LOGS",onClick:{openLink:{url:$u}}}}]}]}]}]}')
          curl -s -X POST "$GOOGLE_CHAT_WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          version: ${{ inputs.mise_version || '' }}
          cache: true
          experimental: true
          log_level: "info"

      - name: Configure private git repository
        if: env.GH_PAT != ''
        run: |
          if [ "${{ inputs.go_private_full }}" = "true" ]; then
            go env -w GOPRIVATE=github.com/nics-dp
            go env -w GONOSUMDB=github.com/nics-dp
            git config --global url."https://${{ env.GH_PAT }}@github.com/".insteadOf "git@github.com:"
          fi
          git config --global url."https://${{ env.GH_PAT }}@github.com".insteadOf "https://github.com"

      - name: Prepare environment
        run: mise run prepare

      - name: Run security scan
        run: mise run security

      - name: Notify on failure
        if: failure()
        run: |
          if [ -z "$GOOGLE_CHAT_WEBHOOK" ]; then exit 0; fi
          case "$EVENT_NAME" in
            pull_request) TITLE="PR #$PR_NUMBER: $PR_TITLE: Security Scan Failed" ;;
            push)         TITLE="Push to $REF_NAME: Security Scan Failed" ;;
            release)      TITLE="Release $RELEASE_TAG: Security Scan Failed" ;;
            *)            TITLE="Security Scan Failed" ;;
          esac
          PAYLOAD=$(jq -n --arg t "$TITLE" --arg a "$ACTOR" --arg r "$REPOSITORY" --arg b "$REF_NAME" --arg u "$RUN_URL" \
            '{cards:[{header:{title:$t},sections:[{widgets:[{keyValue:{topLabel:"Triggered by",content:$a,icon:"PERSON"}},{keyValue:{topLabel:"Repository",content:$r}},{keyValue:{topLabel:"Branch",content:$b}}]},{widgets:[{buttons:[{textButton:{text:"VIEW LOGS",onClick:{openLink:{url:$u}}}}]}]}]}]}')
          curl -s -X POST "$GOOGLE_CHAT_WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: [lint, security]
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'release' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/heads/release/')))
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          version: ${{ inputs.mise_version || '' }}
          cache: true
          experimental: true
          log_level: "info"

      - name: Configure private git repository
        if: env.GH_PAT != ''
        run: |
          if [ "${{ inputs.go_private_full }}" = "true" ]; then
            go env -w GOPRIVATE=github.com/nics-dp
            go env -w GONOSUMDB=github.com/nics-dp
            git config --global url."https://${{ env.GH_PAT }}@github.com/".insteadOf "git@github.com:"
          fi
          git config --global url."https://${{ env.GH_PAT }}@github.com".insteadOf "https://github.com"

      - name: Prepare environment
        run: mise run prepare

      - name: Run unit tests
        run: ${{ inputs.test_command }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-data
          path: pkgCoverage.out
          retention-days: 1

      - name: Notify on failure
        if: failure()
        run: |
          if [ -z "$GOOGLE_CHAT_WEBHOOK" ]; then exit 0; fi
          case "$EVENT_NAME" in
            pull_request) TITLE="PR #$PR_NUMBER: $PR_TITLE: Unit Test Failed" ;;
            push)         TITLE="Push to $REF_NAME: Unit Test Failed" ;;
            release)      TITLE="Release $RELEASE_TAG: Unit Test Failed" ;;
            *)            TITLE="Unit Test Failed" ;;
          esac
          PAYLOAD=$(jq -n --arg t "$TITLE" --arg a "$ACTOR" --arg r "$REPOSITORY" --arg b "$REF_NAME" --arg u "$RUN_URL" \
            '{cards:[{header:{title:$t},sections:[{widgets:[{keyValue:{topLabel:"Triggered by",content:$a,icon:"PERSON"}},{keyValue:{topLabel:"Repository",content:$r}},{keyValue:{topLabel:"Branch",content:$b}}]},{widgets:[{buttons:[{textButton:{text:"VIEW LOGS",onClick:{openLink:{url:$u}}}}]}]}]}]}')
          curl -s -X POST "$GOOGLE_CHAT_WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"

  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [unit-test]
    if: github.event_name == 'release' && inputs.run_report
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          version: ${{ inputs.mise_version || '' }}
          cache: true
          experimental: true

      - name: Configure private git repository
        if: env.GH_PAT != ''
        run: |
          if [ "${{ inputs.go_private_full }}" = "true" ]; then
            go env -w GOPRIVATE=github.com/nics-dp
            go env -w GONOSUMDB=github.com/nics-dp
            git config --global url."https://${{ env.GH_PAT }}@github.com/".insteadOf "git@github.com:"
          fi
          git config --global url."https://${{ env.GH_PAT }}@github.com".insteadOf "https://github.com"

      - name: Prepare environment
        run: mise run prepare

      - name: Download coverage data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-data

      - name: Generate report
        run: ${{ inputs.report_command }}

      - name: Upload reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: reports
          path: |
            coverage.html
            coverage.md
            gosec-report.json

      - name: Notify on failure
        if: failure()
        run: |
          if [ -z "$GOOGLE_CHAT_WEBHOOK" ]; then exit 0; fi
          case "$EVENT_NAME" in
            pull_request) TITLE="PR #$PR_NUMBER: $PR_TITLE: Report Generation Failed" ;;
            push)         TITLE="Push to $REF_NAME: Report Generation Failed" ;;
            release)      TITLE="Release $RELEASE_TAG: Report Generation Failed" ;;
            *)            TITLE="Report Generation Failed" ;;
          esac
          PAYLOAD=$(jq -n --arg t "$TITLE" --arg a "$ACTOR" --arg r "$REPOSITORY" --arg b "$REF_NAME" --arg u "$RUN_URL" \
            '{cards:[{header:{title:$t},sections:[{widgets:[{keyValue:{topLabel:"Triggered by",content:$a,icon:"PERSON"}},{keyValue:{topLabel:"Repository",content:$r}},{keyValue:{topLabel:"Branch",content:$b}}]},{widgets:[{buttons:[{textButton:{text:"VIEW LOGS",onClick:{openLink:{url:$u}}}}]}]}]}]}')
          curl -s -X POST "$GOOGLE_CHAT_WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [lint, security, unit-test, report]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.unit-test.result == 'success' || needs.unit-test.result == 'skipped') &&
      (needs.report.result == 'success' || needs.report.result == 'skipped') &&
      (github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    env:
      GITHUB_REF: ${{ github.ref }}
    steps:
      - name: Notify on success
        run: |
          if [ -z "$GOOGLE_CHAT_WEBHOOK" ]; then exit 0; fi

          if [ "$EVENT_NAME" = "release" ]; then
            STAGES="Lint -> Security -> Unit Test -> Report"
          elif [ "$GITHUB_REF" = "refs/heads/main" ] || [ "$GITHUB_REF" = "refs/heads/dev" ] || echo "$GITHUB_REF" | grep -q "^refs/heads/release/"; then
            STAGES="Lint -> Security -> Unit Test"
          else
            STAGES="Lint -> Security"
          fi

          case "$EVENT_NAME" in
            pull_request) TITLE="PR #$PR_NUMBER: $PR_TITLE: CI Passed" ;;
            push)         TITLE="Push to $REF_NAME: CI Passed" ;;
            release)      TITLE="Release $RELEASE_TAG: CI Passed" ;;
            *)            TITLE="CI Passed" ;;
          esac

          PAYLOAD=$(jq -n --arg t "$TITLE" --arg a "$ACTOR" --arg r "$REPOSITORY" --arg b "$REF_NAME" --arg s "$STAGES" --arg u "$RUN_URL" \
            '{cards:[{header:{title:$t},sections:[{widgets:[{keyValue:{topLabel:"Triggered by",content:$a,icon:"PERSON"}},{keyValue:{topLabel:"Repository",content:$r}},{keyValue:{topLabel:"Branch",content:$b}},{keyValue:{topLabel:"Stages",content:$s}}]},{widgets:[{buttons:[{textButton:{text:"VIEW DETAILS",onClick:{openLink:{url:$u}}}}]}]}]}]}')
          curl -s -X POST "$GOOGLE_CHAT_WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"
