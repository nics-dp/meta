# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: python-test

on:
  workflow_call:
    inputs:
      test_command:
        required: false
        type: string
        default: "mise run ci:test"
        description: "Command to run unit tests (must produce coverage.xml)"
      run_report:
        required: false
        type: boolean
        default: false
        description: "Whether to run the report job after tests"

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Unit Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          cache: true
          experimental: true
          log_level: "info"

      - name: Initialize environment
        run: mise run init

      - name: Run unit tests
        env:
          TEST_COMMAND: ${{ inputs.test_command }}
        run: |
          bash -euo pipefail -lc "$TEST_COMMAND"

      - name: Upload coverage artifact
        if: inputs.run_report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-data
          path: coverage.xml
          retention-days: 1

  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [test]
    if: inputs.run_report
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          cache: true
          experimental: true
          log_level: "info"

      - name: Initialize environment
        run: mise run init

      - name: Download coverage data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-data

      - name: Generate coverage summary
        id: coverage-summary
        run: |
          TOTAL=$(coverage report --format=total 2>/dev/null || echo "N/A")
          {
            echo "## Test Coverage: ${TOTAL}%"
            echo ""
            echo '```'
            coverage report --show-missing || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          {
            echo 'message<<EOF'
            echo "## Test Coverage: ${TOTAL}%"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        with:
          header: python-test-coverage
          message: ${{ steps.coverage-summary.outputs.message }}
