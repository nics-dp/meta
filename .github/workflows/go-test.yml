# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: go-test

on:
  workflow_call:
    inputs:
      go_private_full:
        required: false
        type: boolean
        default: true
        description: "Set GOPRIVATE/GONOSUMDB for repos importing nics-dp private modules"
      test_command:
        required: false
        type: string
        default: "mise run ci:test"
        description: "Command to run unit tests (must produce coverage.out)"
      run_report:
        required: false
        type: boolean
        default: false
        description: "Whether to run the report job after tests"
    secrets:
      gh_pat:
        required: false

env:
  MISE_AUTO_INSTALL: "false"

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    env:
      HAS_GH_PAT: ${{ secrets.gh_pat != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          token: ${{ secrets.gh_pat }}

      - name: Configure private git repository
        if: env.HAS_GH_PAT == 'true'
        env:
          GH_PAT: ${{ secrets.gh_pat }}
          GO_PRIVATE_FULL: ${{ inputs.go_private_full }}
        run: |
          if [ "$GO_PRIVATE_FULL" = "true" ]; then
            echo "GOPRIVATE=github.com/nics-dp" >> "$GITHUB_ENV"
            echo "GONOSUMDB=github.com/nics-dp" >> "$GITHUB_ENV"
            git config --global url."https://${GH_PAT}@github.com/nics-dp/".insteadOf "git@github.com:nics-dp/"
          fi
          git config --global url."https://${GH_PAT}@github.com/nics-dp".insteadOf "https://github.com/nics-dp"

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
          experimental: true
          log_level: "info"
          install: false

      - name: Install required tools
        run: mise install go

      - name: Initialize environment
        run: mise run go:mod

      - name: Run unit tests
        env:
          TEST_COMMAND: ${{ inputs.test_command }}
        run: |
          bash -euo pipefail -lc "$TEST_COMMAND"

      - name: Upload coverage artifact
        if: inputs.run_report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-data
          path: coverage.out
          retention-days: 1

      - name: Revoke private git repository access
        if: always() && env.HAS_GH_PAT == 'true'
        env:
          GH_PAT: ${{ secrets.gh_pat }}
        run: |
          git config --global --remove-section "url.https://${GH_PAT}@github.com/nics-dp/" 2>/dev/null || true
          git config --global --remove-section "url.https://${GH_PAT}@github.com/nics-dp" 2>/dev/null || true

  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [test]
    if: inputs.run_report
    env:
      HAS_GH_PAT: ${{ secrets.gh_pat != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          token: ${{ secrets.gh_pat }}

      - name: Configure private git repository
        if: env.HAS_GH_PAT == 'true'
        env:
          GH_PAT: ${{ secrets.gh_pat }}
          GO_PRIVATE_FULL: ${{ inputs.go_private_full }}
        run: |
          if [ "$GO_PRIVATE_FULL" = "true" ]; then
            echo "GOPRIVATE=github.com/nics-dp" >> "$GITHUB_ENV"
            echo "GONOSUMDB=github.com/nics-dp" >> "$GITHUB_ENV"
            git config --global url."https://${GH_PAT}@github.com/nics-dp/".insteadOf "git@github.com:nics-dp/"
          fi
          git config --global url."https://${GH_PAT}@github.com/nics-dp".insteadOf "https://github.com/nics-dp"

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
          experimental: true
          log_level: "info"
          install: false

      - name: Install required tools
        run: mise install go

      - name: Initialize environment
        run: mise run go:mod

      - name: Download coverage data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-data

      - name: Generate report
        run: |
          go tool cover -html=coverage.out -o coverage.html
          go tool cover -func=coverage.out > coverage.md

      - name: Upload reports
        id: upload-reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reports
          path: |
            coverage.html
            coverage.md

      - name: Coverage summary
        if: github.event_name == 'pull_request'
        id: coverage-summary
        env:
          ARTIFACT_URL: ${{ steps.upload-reports.outputs.artifact-url }}
        run: |
          TOTAL=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}')
          {
            echo "## Test Coverage: ${TOTAL}"
            echo ""
            echo "📦 [Full Report](${ARTIFACT_URL})"
          } >> "$GITHUB_STEP_SUMMARY"
          {
            echo 'message<<EOF'
            echo "## Test Coverage: ${TOTAL}"
            echo ""
            echo "📦 [Full Report](${ARTIFACT_URL})"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: go-test-coverage
          message: ${{ steps.coverage-summary.outputs.message }}

      - name: Revoke private git repository access
        if: always() && env.HAS_GH_PAT == 'true'
        env:
          GH_PAT: ${{ secrets.gh_pat }}
        run: |
          git config --global --remove-section "url.https://${GH_PAT}@github.com/nics-dp/" 2>/dev/null || true
          git config --global --remove-section "url.https://${GH_PAT}@github.com/nics-dp" 2>/dev/null || true
