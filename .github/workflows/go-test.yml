# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: go-test

on:
  workflow_call:
    inputs:
      go_private_full:
        required: false
        type: boolean
        default: true
        description: "Set GOPRIVATE/GONOSUMDB for repos importing nics-dp private modules"
      test_command:
        required: false
        type: string
        default: "mise run test"
        description: "Command to run unit tests (must produce coverage.out)"
      run_report:
        required: false
        type: boolean
        default: false
        description: "Whether to run the report job after tests"
      report_command:
        required: false
        type: string
        default: "mise run report"
        description: "Command to generate coverage report"
    secrets:
      gh_pat:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    env:
      GH_PAT: ${{ secrets.gh_pat }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          cache: true
          experimental: true
          log_level: "info"

      - name: Prepare environment
        run: mise run prepare

      - name: Configure private git repository
        if: env.GH_PAT != ''
        env:
          GO_PRIVATE_FULL: ${{ inputs.go_private_full }}
        run: |
          if [ "$GO_PRIVATE_FULL" = "true" ]; then
            echo "GOPRIVATE=github.com/nics-dp" >> "$GITHUB_ENV"
            echo "GONOSUMDB=github.com/nics-dp" >> "$GITHUB_ENV"
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "git@github.com:"
          fi
          git config --global url."https://${GH_PAT}@github.com/nics-dp".insteadOf "https://github.com/nics-dp"

      - name: Run unit tests
        env:
          TEST_COMMAND: ${{ inputs.test_command }}
        run: |
          bash -lc "$TEST_COMMAND"

      - name: Upload coverage artifact
        if: inputs.run_report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-data
          path: coverage.out
          retention-days: 1

  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [test]
    if: inputs.run_report
    env:
      GH_PAT: ${{ secrets.gh_pat }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          cache: true
          experimental: true

      - name: Prepare environment
        run: mise run prepare

      - name: Configure private git repository
        if: env.GH_PAT != ''
        env:
          GO_PRIVATE_FULL: ${{ inputs.go_private_full }}
        run: |
          if [ "$GO_PRIVATE_FULL" = "true" ]; then
            echo "GOPRIVATE=github.com/nics-dp" >> "$GITHUB_ENV"
            echo "GONOSUMDB=github.com/nics-dp" >> "$GITHUB_ENV"
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "git@github.com:"
          fi
          git config --global url."https://${GH_PAT}@github.com/nics-dp".insteadOf "https://github.com/nics-dp"

      - name: Download coverage data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-data

      - name: Generate report
        env:
          REPORT_COMMAND: ${{ inputs.report_command }}
        run: |
          bash -lc "$REPORT_COMMAND"

      - name: Upload reports
        id: upload-reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: reports
          path: |
            coverage.html
            coverage.md
            gosec-report.json

      - name: Coverage summary
        if: github.event_name == 'pull_request'
        id: coverage-summary
        env:
          ARTIFACT_URL: ${{ steps.upload-reports.outputs.artifact-url }}
        run: |
          TOTAL=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}')
          {
            echo "## Test Coverage: ${TOTAL}"
            echo ""
            echo "📦 [Full Report](${ARTIFACT_URL})"
          } >> "$GITHUB_STEP_SUMMARY"
          {
            echo 'message<<EOF'
            echo "## Test Coverage: ${TOTAL}"
            echo ""
            echo "📦 [Full Report](${ARTIFACT_URL})"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        with:
          header: go-test-coverage
          message: ${{ steps.coverage-summary.outputs.message }}
