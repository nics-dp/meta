# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: upstream-release-check

on:
  workflow_call:
    inputs:
      upstream_repo:
        description: "Upstream repository (e.g., patroni/patroni)"
        required: true
        type: string
      version_file:
        description: "File containing the current version (e.g., Dockerfile.env)"
        required: true
        type: string
      version_variable:
        description: "Variable name in version_file (e.g., PATRONI_VERSION)"
        required: true
        type: string
      release_suffix:
        description: "Suffix to append to upstream tag for our release (e.g., .0.0.1)"
        required: false
        type: string
        default: ".dcf"
    secrets:
      gh_token:
        required: true

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.gh_token }}

      - name: Get upstream latest release
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.gh_token }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
        run: |
          latest=$(gh api "repos/${UPSTREAM_REPO}/releases/latest" --jq '.tag_name')
          echo "version=$latest" >> "$GITHUB_OUTPUT"
          echo "Upstream latest: $latest"

      - name: Get current version
        id: current
        env:
          VERSION_VARIABLE: ${{ inputs.version_variable }}
          VERSION_FILE: ${{ inputs.version_file }}
        run: |
          current=$(grep "^${VERSION_VARIABLE}=" "$VERSION_FILE" | cut -d'=' -f2)
          echo "version=$current" >> "$GITHUB_OUTPUT"
          echo "Current: $current"

      - name: Compare versions
        id: compare
        env:
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.version }}
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
        run: |
          if [ "$UPSTREAM_VERSION" = "$CURRENT_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New version available: $UPSTREAM_VERSION"
          fi

      - name: Update version file
        if: steps.compare.outputs.changed == 'true'
        env:
          VERSION_VARIABLE: ${{ inputs.version_variable }}
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.version }}
          VERSION_FILE: ${{ inputs.version_file }}
        run: |
          sed -i "s/^${VERSION_VARIABLE}=.*/${VERSION_VARIABLE}=${UPSTREAM_VERSION}/" "$VERSION_FILE"
          echo "Updated ${VERSION_FILE}:"
          cat "$VERSION_FILE"

      - name: Create Pull Request
        if: steps.compare.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: "chore: bump ${{ inputs.upstream_repo }} to ${{ steps.upstream.outputs.version }}"
          title: "chore: bump ${{ inputs.upstream_repo }} to ${{ steps.upstream.outputs.version }}"
          body: |
            Upstream [${{ inputs.upstream_repo }}](https://github.com/${{ inputs.upstream_repo }}) released **${{ steps.upstream.outputs.version }}**.

            This PR updates `${{ inputs.version_file }}` from `${{ steps.current.outputs.version }}` to `${{ steps.upstream.outputs.version }}`.

            After merge, a release with tag `${{ steps.upstream.outputs.version }}${{ inputs.release_suffix }}` will be created automatically to trigger the image build.
          branch: "chore/bump-upstream-${{ inputs.version_variable }}"
          delete-branch: true
          labels: dependencies
          token: ${{ secrets.gh_token }}

      - name: Check outputs
        if: steps.cpr.outputs.pull-request-number
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.version }}
          RELEASE_SUFFIX: ${{ inputs.release_suffix }}
        run: |
          echo "Pull Request Number - ${PR_NUMBER}"
          echo "Pull Request URL - ${PR_URL}"
          echo "Upstream version - ${UPSTREAM_VERSION}"
          echo "Release tag (after merge) - ${UPSTREAM_VERSION}${RELEASE_SUFFIX}"
