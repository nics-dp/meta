# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: gosec

on:
  workflow_call:
    inputs:
      go_private_full:
        required: false
        type: boolean
        default: true
        description: "Set GOPRIVATE/GONOSUMDB for repos importing nics-dp private modules"
    secrets:
      gh_pat:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    env:
      HAS_GH_PAT: ${{ secrets.gh_pat != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure private git repository
        if: env.HAS_GH_PAT == 'true'
        env:
          GH_PAT: ${{ secrets.gh_pat }}
          GO_PRIVATE_FULL: ${{ inputs.go_private_full }}
        run: |
          if [ "$GO_PRIVATE_FULL" = "true" ]; then
            echo "GOPRIVATE=github.com/nics-dp" >> "$GITHUB_ENV"
            echo "GONOSUMDB=github.com/nics-dp" >> "$GITHUB_ENV"
            git config --global url."https://${GH_PAT}@github.com/nics-dp/".insteadOf "git@github.com:nics-dp/"
          fi
          git config --global url."https://${GH_PAT}@github.com/nics-dp".insteadOf "https://github.com/nics-dp"

      - name: Install mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          cache: true
          experimental: true
          log_level: "info"

      - name: Initialize environment
        run: mise run init

      - name: Run security scan
        id: gosec
        run: |
          mise run ci:go-sec 2>&1 | tee gosec-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          {
            echo "## gosec Security Scan"
            echo ""
            if [ -s gosec-output.txt ]; then
              echo '```'
              tail -50 gosec-output.txt
              echo '```'
            else
              echo "No issues found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        with:
          header: gosec
          message: |
            ## gosec Security Scan
            <details>
            <summary>Results</summary>

            ```
            ${{ steps.gosec.outputs.exit_code == '0' && 'No issues found.' || 'See CI log for details.' }}
            ```

            </details>

      - name: Revoke private git repository access
        if: always() && env.HAS_GH_PAT == 'true'
        env:
          GH_PAT: ${{ secrets.gh_pat }}
        run: |
          git config --global --remove-section "url.https://${GH_PAT}@github.com/nics-dp/" 2>/dev/null || true
          git config --global --remove-section "url.https://${GH_PAT}@github.com/nics-dp" 2>/dev/null || true

      - name: Fail if scan found issues
        if: always() && steps.gosec.outputs.exit_code != '0'
        run: exit 1
