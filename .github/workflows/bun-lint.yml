# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: bun-lint

on:
  workflow_call:
    inputs:
      command:
        required: false
        type: string
        default: "bun run lint"
        description: "Lint command to run"

permissions:
  contents: read

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44e0a0e05bf0299db72d5 # v2.0.3
      - run: bun install --frozen-lockfile

      - name: Run lint
        env:
          LINT_COMMAND: ${{ inputs.command }}
        run: bash -euo pipefail -lc "$LINT_COMMAND"
