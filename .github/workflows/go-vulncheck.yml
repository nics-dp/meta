# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: govulncheck

on:
  workflow_call:
    inputs:
      go_private_full:
        required: false
        type: boolean
        default: true
        description: "Set GOPRIVATE/GONOSUMDB for repos importing nics-dp private modules"
    secrets:
      gh_pat:
        required: false

env:
  MISE_AUTO_INSTALL: "false"

permissions:
  contents: read
  pull-requests: write

jobs:
  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    env:
      HAS_GH_PAT: ${{ secrets.gh_pat != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          token: ${{ secrets.gh_pat }}

      - name: Configure private git repository
        if: env.HAS_GH_PAT == 'true'
        env:
          GH_PAT: ${{ secrets.gh_pat }}
          GO_PRIVATE_FULL: ${{ inputs.go_private_full }}
        run: |
          if [ "$GO_PRIVATE_FULL" = "true" ]; then
            echo "GOPRIVATE=github.com/nics-dp" >> "$GITHUB_ENV"
            echo "GONOSUMDB=github.com/nics-dp" >> "$GITHUB_ENV"
            git config --global url."https://${GH_PAT}@github.com/nics-dp/".insteadOf "git@github.com:nics-dp/"
          fi
          git config --global url."https://${GH_PAT}@github.com/nics-dp".insteadOf "https://github.com/nics-dp"

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
          experimental: true
          log_level: "info"
          install: false

      - name: Install required tools
        run: mise install go "go:golang.org/x/vuln/cmd/govulncheck"

      - name: Initialize environment
        run: mise run go:mod

      - name: Run govulncheck
        id: vulncheck
        run: |
          mise run ci:go-vulncheck 2>&1 | tee vulncheck-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          {
            echo "## govulncheck Vulnerability Check"
            echo ""
            if grep -q "No vulnerabilities found" vulncheck-output.txt 2>/dev/null; then
              echo "No vulnerabilities found."
            elif [ -s vulncheck-output.txt ]; then
              echo '```'
              tail -80 vulncheck-output.txt
              echo '```'
            else
              echo "No output captured."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@d4d6b0936434b21bc8345ad45a440c5f7d2c40ff # v3.0.3
        with:
          header: govulncheck
          message: |
            ## govulncheck Vulnerability Check
            <details>
            <summary>Results</summary>

            ```
            ${{ steps.vulncheck.outputs.exit_code == '0' && 'No vulnerabilities found.' || 'Vulnerabilities detected. See CI log for details.' }}
            ```

            </details>

      - name: Revoke private git repository access
        if: always() && env.HAS_GH_PAT == 'true'
        env:
          GH_PAT: ${{ secrets.gh_pat }}
        run: |
          git config --global --remove-section "url.https://${GH_PAT}@github.com/nics-dp/" 2>/dev/null || true
          git config --global --remove-section "url.https://${GH_PAT}@github.com/nics-dp" 2>/dev/null || true

      - name: Fail if vulnerabilities found
        if: always() && steps.vulncheck.outputs.exit_code != '0'
        run: exit 1
