# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: govulncheck

on:
  workflow_call:
    inputs:
      go_private_full:
        required: false
        type: boolean
        default: true
        description: "Set GOPRIVATE/GONOSUMDB for repos importing nics-dp private modules"
    secrets:
      gh_pat:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    env:
      GH_PAT: ${{ secrets.gh_pat }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          cache: true
          experimental: true
          log_level: "info"

      - name: Prepare environment
        run: mise run prepare

      - name: Configure private git repository
        if: env.GH_PAT != ''
        env:
          GO_PRIVATE_FULL: ${{ inputs.go_private_full }}
        run: |
          if [ "$GO_PRIVATE_FULL" = "true" ]; then
            echo "GOPRIVATE=github.com/nics-dp" >> "$GITHUB_ENV"
            echo "GONOSUMDB=github.com/nics-dp" >> "$GITHUB_ENV"
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "git@github.com:"
          fi
          git config --global url."https://${GH_PAT}@github.com".insteadOf "https://github.com"

      - name: Run govulncheck
        id: vulncheck
        run: |
          mise run vulncheck 2>&1 | tee vulncheck-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          {
            echo "## govulncheck Vulnerability Check"
            echo ""
            if grep -q "No vulnerabilities found" vulncheck-output.txt 2>/dev/null; then
              echo "No vulnerabilities found."
            elif [ -s vulncheck-output.txt ]; then
              echo '```'
              tail -80 vulncheck-output.txt
              echo '```'
            else
              echo "No output captured."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        with:
          header: govulncheck
          message: |
            ## govulncheck Vulnerability Check
            <details>
            <summary>Results</summary>

            ```
            ${{ steps.vulncheck.outputs.exit_code == '0' && 'No vulnerabilities found.' || 'Vulnerabilities detected. See CI log for details.' }}
            ```

            </details>

      - name: Fail if vulnerabilities found
        if: always() && steps.vulncheck.outputs.exit_code != '0'
        run: exit 1
