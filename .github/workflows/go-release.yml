# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: go-release

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
        description: "Project name for archive naming (e.g., dcf-platform)"
      binary:
        required: true
        type: string
        description: "Comma-separated name:path pairs (e.g., platform:./cmd/platform or tui:./cmd/tui,node:./cmd/node)"
      platforms:
        required: false
        type: string
        default: "linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64"
        description: "Comma-separated GOOS/GOARCH targets"
      go_version:
        required: false
        type: string
        default: "stable"
      cgo_enabled:
        required: false
        type: boolean
        default: false
        description: "Enable CGO for native and supported cross-compilation (linux amd64↔arm64)"
      go_env:
        required: false
        type: string
        default: "GOEXPERIMENT=jsonv2,simd,runtimesecret,goroutineleakprofile"
        description: "Extra env vars for build, one per line (e.g., GOEXPERIMENT=jsonv2)"
      ldflags:
        required: false
        type: string
        default: ""
        description: "Custom ldflags (default: -s -w with version/commit/date injection)"
      extra_build_flags:
        required: false
        type: string
        default: "-trimpath"
        description: "Extra go build flags"
      go_private_full:
        required: false
        type: boolean
        default: true
        description: "Set GOPRIVATE/GONOPROXY/GONOSUMDB for nics-dp private modules"
      notarize:
        required: false
        type: boolean
        default: false
        description: "Sign and notarize macOS binaries with quill"
      snapshot:
        required: false
        type: boolean
        default: false
        description: "Snapshot build (no GitHub Release, short artifact retention)"
      ref:
        required: false
        type: string
        default: ""
        description: "Git ref to checkout (defaults to event ref)"
      runs_on:
        required: false
        type: string
        default: '"ubuntu-latest"'
        description: "Runner for Linux build jobs as JSON"
      runs_on_darwin:
        required: false
        type: string
        default: '"macos-latest"'
        description: "Runner for macOS build jobs as JSON"
      runs_on_windows:
        required: false
        type: string
        default: '"windows-latest"'
        description: "Runner for Windows build jobs as JSON"
    secrets:
      gh_pat:
        required: false
      quill_sign_p12:
        required: false
      quill_sign_password:
        required: false
      quill_notary_key:
        required: false
      quill_notary_key_id:
        required: false
      quill_notary_issuer:
        required: false

jobs:
  prepare:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Compute version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          SNAPSHOT: ${{ inputs.snapshot }}
        run: |
          if [[ "$SNAPSHOT" == "true" ]]; then
            echo "version=0.0.0-snapshot+$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            echo "version_tag=" >> "$GITHUB_OUTPUT"
          else
            TAG="${RELEASE_TAG:-$GITHUB_REF_NAME}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "version_tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate build matrix
        id: matrix
        env:
          PLATFORMS: ${{ inputs.platforms }}
          RUNS_ON_LINUX: ${{ inputs.runs_on }}
          RUNS_ON_DARWIN: ${{ inputs.runs_on_darwin }}
          RUNS_ON_WINDOWS: ${{ inputs.runs_on_windows }}
          CGO_ENABLED: ${{ inputs.cgo_enabled && '1' || '0' }}
        run: |
          MATRIX=$(echo "$PLATFORMS" | tr ',' '\n' | jq -R \
            --argjson linux_runner "$RUNS_ON_LINUX" \
            --argjson darwin_runner "$RUNS_ON_DARWIN" \
            --argjson windows_runner "$RUNS_ON_WINDOWS" \
            --arg cgo "$CGO_ENABLED" '
            split("/") |
            (if length == 3 then
              {goos: .[0], goarch: .[1], goarm: (.[2] | ltrimstr("v"))}
            else
              {goos: .[0], goarch: .[1], goarm: ""}
            end) |
            .runs_on = (
              if $cgo == "0" then $linux_runner
              elif .goos == "darwin" then $darwin_runner
              elif .goos == "windows" then $windows_runner
              else $linux_runner
              end
            )
          ' | jq -sc '{include: .}')
          echo "result=${MATRIX}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.runs_on }}
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      HAS_GH_PAT: ${{ secrets.gh_pat != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Configure private git repository
        if: env.HAS_GH_PAT == 'true'
        env:
          GH_PAT: ${{ secrets.gh_pat }}
          GO_PRIVATE_FULL: ${{ inputs.go_private_full }}
        run: |
          if [[ "$GO_PRIVATE_FULL" == "true" ]]; then
            {
              echo "GOPRIVATE=github.com/nics-dp"
              echo "GONOPROXY=github.com/nics-dp"
              echo "GONOSUMDB=github.com/nics-dp"
            } >> "$GITHUB_ENV"
            git config --global url."https://${GH_PAT}@github.com/nics-dp/".insteadOf "git@github.com:nics-dp/"
          fi
          git config --global url."https://${GH_PAT}@github.com/nics-dp".insteadOf "https://github.com/nics-dp"

      - name: Cache vendor directory
        if: contains(inputs.extra_build_flags, '-mod=vendor')
        uses: actions/cache@v4
        with:
          path: vendor
          key: go-vendor-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-vendor-${{ runner.os }}-${{ runner.arch }}-

      - name: Vendor Go modules
        if: contains(inputs.extra_build_flags, '-mod=vendor')
        run: go mod vendor

      - name: Install cross-compiler
        if: inputs.cgo_enabled && runner.arch == 'X64' && matrix.goarch == 'arm64' && matrix.goos == 'linux'
        run: |
          sudo apt-get update && sudo apt-get install -y g++-aarch64-linux-gnu
          echo "CC=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: ${{ inputs.cgo_enabled && '1' || '0' }}
          GO_EXTRA_ENV: ${{ inputs.go_env }}
          VERSION: ${{ needs.prepare.outputs.version }}
          LDFLAGS_INPUT: ${{ inputs.ldflags }}
          BINARY_PAIRS: ${{ inputs.binary }}
          EXTRA_BUILD_FLAGS: ${{ inputs.extra_build_flags }}
        run: |
          if [[ -n "$GO_EXTRA_ENV" ]]; then
            while IFS= read -r line; do
              [[ -n "$line" ]] && export "${line?}"
            done <<< "$GO_EXTRA_ENV"
          fi

          EXT=""
          if [[ "$GOOS" == "windows" ]]; then
            EXT=".exe"
          fi

          if [[ -n "$LDFLAGS_INPUT" ]]; then
            LDFLAGS="$LDFLAGS_INPUT"
          else
            LDFLAGS="-s -w -X main.Version=v${VERSION} -X main.CommitSHA=$(git rev-parse HEAD) -X main.CommitDate=$(git log -1 --format=%cI)"
          fi

          mkdir -p output

          IFS=',' read -ra PAIRS <<< "$BINARY_PAIRS"
          for pair in "${PAIRS[@]}"; do
            IFS=':' read -r name path <<< "$pair"
            # shellcheck disable=SC2086
            go build $EXTRA_BUILD_FLAGS -ldflags "${LDFLAGS}" -o "output/${name}${EXT}" "$path"
          done

      - name: Sign and notarize macOS binaries
        if: matrix.goos == 'darwin' && inputs.notarize
        env:
          QUILL_SIGN_P12: ${{ secrets.quill_sign_p12 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.quill_sign_password }}
          QUILL_NOTARY_KEY: ${{ secrets.quill_notary_key }}
          QUILL_NOTARY_KEY_ID: ${{ secrets.quill_notary_key_id }}
          QUILL_NOTARY_ISSUER: ${{ secrets.quill_notary_issuer }}
        run: |
          go install github.com/anchore/quill/cmd/quill@v0.7.1
          for bin in output/*; do
            [[ -f "$bin" ]] && quill sign-and-notarize "$bin"
          done

      - name: Create archive
        id: archive
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET_GOOS: ${{ matrix.goos }}
          TARGET_GOARCH: ${{ matrix.goarch }}
          TARGET_GOARM: ${{ matrix.goarm }}
          PROJECT_NAME: ${{ inputs.project_name }}
        run: |
          case "$TARGET_GOOS" in
            linux)   OS_TITLE="Linux" ;;
            darwin)  OS_TITLE="Darwin" ;;
            windows) OS_TITLE="Windows" ;;
            freebsd) OS_TITLE="FreeBSD" ;;
            openbsd) OS_TITLE="OpenBSD" ;;
            netbsd)  OS_TITLE="NetBSD" ;;
            *)       OS_TITLE="$TARGET_GOOS" ;;
          esac

          case "$TARGET_GOARCH" in
            amd64) ARCH_LABEL="x86_64" ;;
            386)   ARCH_LABEL="i386" ;;
            arm)   ARCH_LABEL="armv${TARGET_GOARM:-7}" ;;
            *)     ARCH_LABEL="$TARGET_GOARCH" ;;
          esac

          ARCHIVE_DIR="${PROJECT_NAME}_${VERSION}_${OS_TITLE}_${ARCH_LABEL}"
          mkdir -p "${ARCHIVE_DIR}"
          cp output/* "${ARCHIVE_DIR}/"
          cp README* LICENSE* "${ARCHIVE_DIR}/" 2>/dev/null || true

          if [[ "$TARGET_GOOS" == "windows" ]]; then
            7z a -tzip "${ARCHIVE_DIR}.zip" "${ARCHIVE_DIR}"
            echo "file=${ARCHIVE_DIR}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "${ARCHIVE_DIR}.tar.gz" "${ARCHIVE_DIR}"
            echo "file=${ARCHIVE_DIR}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('-v{0}', matrix.goarm) || '' }}
          path: ${{ steps.archive.outputs.file }}
          retention-days: ${{ inputs.snapshot && 7 || 30 }}

      - name: Revoke private git repository access
        if: always() && env.HAS_GH_PAT == 'true'
        env:
          GH_PAT: ${{ secrets.gh_pat }}
        run: |
          git config --global --remove-section "url.https://${GH_PAT}@github.com/nics-dp/" 2>/dev/null || true
          git config --global --remove-section "url.https://${GH_PAT}@github.com/nics-dp" 2>/dev/null || true

  release:
    needs: [prepare, build]
    if: ${{ !inputs.snapshot }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: build-*
          path: dist
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Generate source archive
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          PROJECT_NAME: ${{ inputs.project_name }}
        run: |
          git archive --format=tar.gz \
            --prefix="${PROJECT_NAME}_${VERSION}_source/" \
            HEAD > "dist/${PROJECT_NAME}_${VERSION}_source.tar.gz"

      - name: Generate checksums
        working-directory: dist
        run: |
          shopt -s nullglob
          sha256sum ./*.tar.gz ./*.zip > checksums.txt

      - name: Sign checksums with cosign
        working-directory: dist
        run: cosign sign-blob --bundle checksums.txt.sigstore.json checksums.txt --yes

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
        run: gh release upload "$VERSION_TAG" dist/* --clobber
