# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: SBOM Image

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
        description: "Project name for artifact naming (e.g., dcf-platform)"
      image_name:
        required: true
        type: string
        description: "Docker image name (e.g., dcf-platform)"
      digest:
        required: true
        type: string
        description: "Image digest from build (e.g., sha256:abc123...)"
      ref:
        required: false
        type: string
        default: ""
        description: "Git ref to checkout (defaults to event ref)"
      snapshot:
        required: false
        type: boolean
        default: false
        description: "Snapshot mode (skip release upload)"
      runs_on:
        required: false
        type: string
        default: '"ubuntu-latest"'
        description: 'Runner as JSON (e.g., ''"ubuntu-latest"'' or ''{"group":"releasers"}'')'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY_GHCR: ghcr.io
  GHCR_NAMESPACE: nics-dp

jobs:
  sbom-image:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    permissions:
      actions: read
      contents: write
      packages: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          SNAPSHOT: ${{ inputs.snapshot }}
        run: |
          if [[ "$SNAPSHOT" == "true" ]]; then
            echo "version=0.0.0-snapshot+$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          else
            TAG="${RELEASE_TAG:-$GITHUB_REF_NAME}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "version_tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate SBOM from image (CycloneDX JSON 1.6)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY_GHCR }}/${{ env.GHCR_NAMESPACE }}/${{ inputs.image_name }}@${{ inputs.digest }}
          format: cyclonedx-json
          output-file: sbom-image.cdx.json
          upload-artifact: false

      - name: Set up Go (for tooling)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: false

      - name: Enrich SBOM with parlay
        run: |
          go install github.com/snyk/parlay@v0.11.0
          parlay ecosystems enrich sbom-image.cdx.json > enriched-image.cdx.json

      - name: Scan SBOM with Trivy (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: sbom
          scan-ref: enriched-image.cdx.json
          format: sarif
          output: trivy-image.sarif

      - name: Fix Trivy SARIF empty artifact locations
        run: |
          jq '(.runs[].results[].locations[].physicalLocation.artifactLocation | select(.uri == "")) .uri = "sbom-image.cdx.json"' \
            trivy-image.sarif > trivy-image-fixed.sarif
          mv trivy-image-fixed.sarif trivy-image.sarif

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Scan SBOM with Trivy (JSON)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: sbom
          scan-ref: enriched-image.cdx.json
          format: json
          output: trivy-image.json

      - name: Scan SBOM with Grype (SARIF)
        if: always()
        id: grype-sarif
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: sbom-image.cdx.json
          output-format: sarif
          severity-cutoff: high

      - name: Upload Grype SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: ${{ steps.grype-sarif.outputs.sarif }}
          category: grype-image

      - name: Scan SBOM with Grype (JSON)
        id: grype-json
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: sbom-image.cdx.json
          output-format: json
          severity-cutoff: high

      - name: Prepare release assets
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PROJECT_NAME: ${{ inputs.project_name }}
          GRYPE_JSON: ${{ steps.grype-json.outputs.json }}
        run: |
          mv enriched-image.cdx.json "${PROJECT_NAME}_${VERSION}_image.cdx.json"
          mv trivy-image.json "${PROJECT_NAME}_${VERSION}_image.trivy.json"
          mv "$GRYPE_JSON" "${PROJECT_NAME}_${VERSION}_image.grype.json"

      - name: Upload to GitHub Release
        if: ${{ !inputs.snapshot }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: ${{ steps.version.outputs.version_tag }}
          VERSION: ${{ steps.version.outputs.version }}
          PROJECT_NAME: ${{ inputs.project_name }}
        run: |
          gh release upload "$VERSION_TAG" \
            "${PROJECT_NAME}_${VERSION}_image.cdx.json" \
            "${PROJECT_NAME}_${VERSION}_image.trivy.json" \
            "${PROJECT_NAME}_${VERSION}_image.grype.json" \
            --clobber
