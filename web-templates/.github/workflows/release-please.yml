# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# release-please workflow 模板
# 自動建立 Release PR (含 changelog) 並建立 GitHub Release
#
# 使用方式: 複製到 .github/workflows/release-please.yml
# 注意: 需使用 GH_PAT_RELEASE_NICSDP；僅靠 GITHUB_TOKEN 不會觸發下游 workflows

name: release-please

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    uses: nics-dp/meta/.github/workflows/release-please.yml@main
    secrets:
      gh_pat: ${{ secrets.GH_PAT_RELEASE_NICSDP }}
