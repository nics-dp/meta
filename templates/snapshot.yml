# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# 標準 Snapshot workflow 模板
#
# 使用方式: 複製到新 repo 的 .github/workflows/snapshot.yml
# 參數設定應與 release.yml 保持一致 (project_name, binary, image_name 等)
#
# 根據專案類型調整:
# - Service repo: 保留 go-release + image-build jobs
# - CLI repo: 移除 image-build job
# - Docker-only repo: 移除 go-release job

name: snapshot

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  go-release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'pull_request' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    uses: nics-dp/meta/.github/workflows/go-release.yml@main
    permissions:
      contents: read
    with:
      project_name: TODO        # TODO: 與 release.yml 一致
      binary: "TODO:./cmd/TODO" # TODO: 與 release.yml 一致
      # cgo_enabled: true       # TODO: 與 release.yml 一致
      snapshot: true
      ref: ${{ github.event.workflow_run.head_sha || '' }}
    secrets:
      gh_pat: ${{ secrets.GH_PAT_READ_NICSDP }}

  # 僅 service/Docker repos 需要，CLI repos 請移除此 job
  image-build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'pull_request' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    uses: nics-dp/meta/.github/workflows/image-release.yml@main
    permissions:
      contents: read
      packages: write
    with:
      image_name: TODO          # TODO: 與 release.yml 一致
      runs_on: '{"group":"releasers"}'
      sbom: false
      provenance: false
      attest: false
      ref: ${{ github.event.workflow_run.head_sha || '' }}
    secrets:
      dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
      gh_pat: ${{ secrets.GH_PAT_READ_NICSDP }}

  # 將 artifact 連結回報到 PR，調整 needs 符合專案類型
  notify-pr:
    if: github.event.workflow_run.event == 'pull_request'
    needs: [go-release, image-build] # TODO: CLI repos 改為 [go-release]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "Snapshot build completed. [View artifacts]($RUN_URL)"
