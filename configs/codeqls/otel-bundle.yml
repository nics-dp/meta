# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: "CodeQL Advanced"

on:
  push:
    branches: ["main", "dev"]
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
  pull_request:
    branches: ["main", "dev"]
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
  schedule:
    - cron: "0 0 * * 1" # Every Monday 08:00 on UTC+8
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: go
            build-mode: manual

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@fb0994ef1c058010acf1efccff928b0a83b1ed54 # v4.32.6
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          dependency-caching: true
          queries: security-extended,security-and-quality

      - name: Manual Go build for CodeQL
        if: matrix.language == 'go'
        env:
          CGO_ENABLED: "0"
          GOOS: linux
        run: |
          cd ingester
          go mod download
          go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@fb0994ef1c058010acf1efccff928b0a83b1ed54 # v4.32.6
        with:
          category: "/language:${{matrix.language}}"
