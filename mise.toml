[tools]
actionlint = "latest"
act = "latest"
codeql = { version = "latest", bin_path = "codeql", platforms = """
[linux-x64]
asset_pattern = "codeql-linux64.zip"

[macos-arm64]
asset_pattern = "codeql-osx64.zip"

[macos-x64]
asset_pattern = "codeql-osx64.zip"

[windows-x64]
asset_pattern = "codeql-win64.zip"
""" }

bun = "latest"

# ==============================================================================
#  Aggregator Tasks (cannot be file tasks — name conflicts with ci/ and sbom/ dirs)
# ==============================================================================
[tasks.ci]
description = "Run all CI checks"
depends = [
  "ci:commitlint",
  "ci:hadolint",
  "ci:trivy-iac",
  "ci:trivy-license",
  "ci:go-lint",
  "ci:go-sec",
  "ci:go-vulncheck",
  "ci:semgrep",
  "ci:test",
]

[tasks.sbom]
description = "Run full SBOM pipeline (generate, enrich, scan)"
depends = ["sbom:trivy", "sbom:grype"]