# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: "{{ .ProjectName }}"
    env:
      - CGO_ENABLED=0
    main: .
    ldflags: -s -w -X main.Version=v{{ .Version }} -X main.CommitSHA={{ .Commit }} -X main.CommitDate={{ .CommitDate }}
    goos:
      - linux
    goarch:
      - amd64

checksum:
  name_template: "checksums.txt"

source:
  enabled: true

sboms:
  - artifacts: archive
  - id: source
    artifacts: source

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

dockers:
  - image_templates:
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-amd64"
    goarch: amd64
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.description={{ .ProjectName }}
      - --label=org.opencontainers.image.source={{ .GitURL }}
      - --label=org.opencontainers.image.version=v{{ .Version }}
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.licenses=MIT
    dockerfile: Dockerfile
    use: buildx

docker_manifests:
  - name_template: "ghcr.io/nics-dp/{{ .ProjectName }}:latest"
    image_templates:
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-amd64"
  - name_template: "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-amd64"
  - name_template: "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}"
    image_templates:
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-amd64"
  - name_template: "ghcr.io/nics-dp/{{ .ProjectName }}:{{ .Commit }}"
    image_templates:
      - "ghcr.io/nics-dp/{{ .ProjectName }}:v{{ .Version }}-amd64"

docker_signs:
  - cmd: cosign
    artifacts: manifests
    output: true
    args:
      - "sign"
      - "${artifact}"
      - "--yes"

git:
  tag_sort: -version:refname

release:
  prerelease: auto
