# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# 標準 CodeQL workflow 模板
#
# 使用方式:
# 1. 將此檔案複製到 meta/configs/codeqls/<repo-name>.yml，依需要調整 matrix / build steps
# 2. sync-codeql workflow 會自動同步到 consumer repo 的 .github/workflows/codeql.yml
# 私有 repo: 保留 GH_PAT env、private init 與 Configure access 步驟
# 公開 repo: 可移除 GH_PAT env、private init、Configure access、Revoke access 與 external-repository-token

name: "CodeQL Advanced"

on:
  push:
    branches: ["main", "dev"]
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
  pull_request:
    branches: ["main", "dev"]
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
  schedule:
    - cron: "0 0 * * 1" # Every Monday 08:00 on UTC+8
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    env:
      HAS_GH_PAT: ${{ secrets.GH_PAT_READ_NICSDP != '' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: go
            build-mode: manual
          # TODO: 如有其他語言 (e.g. python)，在此新增

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        if: env.HAS_GH_PAT != 'true'
        uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          dependency-caching: true
          queries: security-extended,security-and-quality

      - name: Initialize CodeQL with private repo access
        if: env.HAS_GH_PAT == 'true'
        uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          dependency-caching: true
          queries: security-extended,security-and-quality
          external-repository-token: ${{ secrets.GH_PAT_READ_NICSDP }}

      - name: Configure access to private Go modules
        if: matrix.language == 'go' && env.HAS_GH_PAT == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT_READ_NICSDP }}
        run: |
          git config --global url."https://${GH_PAT}@github.com/nics-dp".insteadOf "https://github.com/nics-dp"
          git config --global url."https://${GH_PAT}@github.com/nics-dp/".insteadOf "git@github.com:nics-dp/"
          echo "GOPRIVATE=github.com/nics-dp" >> "$GITHUB_ENV"

      # TODO: 如需安裝額外 Go 工具 (e.g. swag)，在此新增步驟
      # - name: Install Go tools
      #   if: matrix.language == 'go'
      #   run: |
      #     go install github.com/swaggo/swag/cmd/swag@latest

      - name: Manual Go build for CodeQL
        if: matrix.language == 'go'
        env:
          CGO_ENABLED: "0"
          GOOS: linux
        run: |
          go mod download
          go build ./...

      - name: Revoke private module access
        if: always() && matrix.language == 'go' && env.HAS_GH_PAT == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT_READ_NICSDP }}
        run: |
          git config --global --remove-section "url.https://${GH_PAT}@github.com/nics-dp" 2>/dev/null || true
          git config --global --remove-section "url.https://${GH_PAT}@github.com/nics-dp/" 2>/dev/null || true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
        with:
          category: "/language:${{matrix.language}}"
