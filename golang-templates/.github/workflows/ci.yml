# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# 標準 CI workflow 模板
# 適用於所有 Go repos (service, CLI, library)
#
# 使用方式: 複製到新 repo 的 .github/workflows/ci.yml
# 私有 repo: 保留 gh_pat secrets
# 公開 repo: 移除所有 secrets 區塊
#
# 根據專案類型調整:
# - Service repo (有 Dockerfile): 保留 hadolint + trivy-iac jobs
# - CLI repo / Library: 移除 hadolint + trivy-iac jobs
# - 非 Go repo: 移除 go-lint, go-sec, go-vulncheck, trivy-license, go-test jobs

name: ci

on:
  push:
    branches: [main, dev, "release/**", "feature/**"]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev, "release/**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check-managed:
    uses: nics-dp/meta/.github/workflows/check-managed-files.yml@main
    permissions:
      pull-requests: read

  commitlint:
    uses: nics-dp/meta/.github/workflows/commitlint.yml@main
    permissions:
      contents: read
      pull-requests: read

  # 僅 Service/Docker repos 需要 (有 Dockerfile 的 repos)
  hadolint:
    uses: nics-dp/meta/.github/workflows/hadolint.yml@main
    permissions:
      contents: read
      checks: write
      pull-requests: write

  # 僅 Service/Docker repos 需要 (有 Dockerfile 的 repos)
  trivy-iac:
    uses: nics-dp/meta/.github/workflows/trivy-iac.yml@main
    permissions:
      actions: read
      contents: read
      pull-requests: write
      security-events: write

  trivy-license:
    uses: nics-dp/meta/.github/workflows/trivy-license.yml@main
    permissions:
      contents: read
      pull-requests: write
    secrets:
      gh_pat: ${{ secrets.GH_PAT_READ_NICSDP }}

  go-lint:
    uses: nics-dp/meta/.github/workflows/go-lint.yml@main
    permissions:
      contents: read
      checks: write
      pull-requests: write
    secrets:
      gh_pat: ${{ secrets.GH_PAT_READ_NICSDP }}

  go-sec:
    uses: nics-dp/meta/.github/workflows/go-sec.yml@main
    permissions:
      contents: read
      pull-requests: write
    secrets:
      gh_pat: ${{ secrets.GH_PAT_READ_NICSDP }}

  go-vulncheck:
    uses: nics-dp/meta/.github/workflows/go-vulncheck.yml@main
    permissions:
      contents: read
      pull-requests: write
    secrets:
      gh_pat: ${{ secrets.GH_PAT_READ_NICSDP }}

  go-semgrep:
    uses: nics-dp/meta/.github/workflows/go-semgrep.yml@main
    permissions:
      contents: read
      pull-requests: write

  go-test:
    needs: [go-lint, go-sec]
    uses: nics-dp/meta/.github/workflows/go-test.yml@main
    permissions:
      contents: read
      pull-requests: write
    secrets:
      gh_pat: ${{ secrets.GH_PAT_READ_NICSDP }}
