[settings]
jobs = 16
task.output = "keep-order"
unix_default_inline_shell_args = "bash -c"

# ------------------------------------------------------------------------------
[tools]
# Golang related
go = "1.26.1"
golangci-lint = "latest"
"github:securego/gosec" = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"

# Dockerfile lint
hadolint = "latest"

# SBOM generation
syft = "latest"
"github:snyk/parlay" = "latest"

# Deps vuln scanning
trivy = "latest"
grype = "latest"

# Static scanning
"pipx:semgrep" = "latest"
codeql = { version = "latest", bin_path = "codeql", platforms = """
[linux-x64]
asset_pattern = "codeql-linux64.zip"

[macos-arm64]
asset_pattern = "codeql-osx64.zip"

[macos-x64]
asset_pattern = "codeql-osx64.zip"

[windows-x64]
asset_pattern = "codeql-win64.zip"
""" }

# Docker Operation
docker-cli = "latest"
docker-compose = "latest"
"github:docker/buildx" = { version = "latest", bin = "buildx" }

# MISC
"github:hangxie/parquet-tools" = "latest"
bun = "latest"
duckdb = "latest"
gum = "latest"

# ------------------------------------------------------------------------------
[env]  # env for mise tasks
# CGO related
CGO_ENABLED = "0"  # duckdb-go-bindings needs cgo
# Go Experiment
GOEXPERIMENT = "jsonv2,simd,runtimesecret,goroutineleakprofile"  # only use goroutineleakprofile in local dev build for debugging
# Go build flags
EXTRA_BUILD_FLAGS = "-v -trimpath -mod=vendor"  # -v: print compiled packages, -trimpath: remove local paths from binary, -mod=vendor: use vendor/ directory
LDFLAGS = "-s -w"  # -s: omit symbol table, -w: omit DWARF debug info (smaller binary)
# Go private module settings
GOPRIVATE = "github.com/nics-dp"
GONOPROXY = "github.com/nics-dp"
GONOSUMDB = "github.com/nics-dp"

# ------------------------------------------------------------------------------
[task_config]
includes = ["git::https://github.com/nics-dp/meta.git//.mise/tasks?ref=main"]

# ==============================================================================
#  Env init Tasks
# ==============================================================================
[tasks.init]
description = "Initialize Environment"
run = ["ruler", "gs:clone", "go:mod"]

# ==============================================================================
#  Misc Tasks
# ==============================================================================

[tasks.clean]
description = "Cleanup leftovers"
run = '''
echo "Cleaning..."
rm -rf gosec-report.json
rm -rf coverage
go clean -testcache -cache
echo "Clean completed!"
'''

[tasks.build]
description = "Build the project"
raw = true
depends = "clean"
run = "go:build"

[tasks.run]
description = "Run the project"
raw = true
run = "mise run go:run <TODO>"

[tasks.test]
description = "Run unit tests with coverage and generate report"
raw = true
depends = ["ci:go-lint", "ci:go-sec", "ci:go-vulncheck", "ci:semgrep"]
run = '''
go test -tags test -mod=vendor -race -coverprofile=coverage.out -coverpkg=<TODO>/internal/... ./test/...
bash scripts/gen_html_markdown_report.sh
'''

[tasks.all]
description = "Full Build Pipeline"
raw = true
run = [
  { task = "clean" },
  { tasks = ["gs:update", "go:upgrade"] },
  { task = "go:mod" },
  { task = "test" },
  { task = "build" },
]

[tasks."lib:local"]
run = "go:local"

[tasks."lib:remote"]
run = "go:remote"

# ==============================================================================
#  CI Tasks
# ==============================================================================
[tasks."ci:test"]
description = "Run unit tests with coverage and generate report"
run = '''
go test -tags test -mod=vendor -race -coverprofile=coverage.out -coverpkg=<TODO>/internal/... ./test/...
go tool cover -html=coverage.out > coverage.html
go tool cover -func=coverage.out > coverage.md
'''

[tasks.ci]
description = "Run all CI checks"
depends = [
  "ci:commitlint",
  "ci:hadolint",
  "ci:trivy-iac",
  "ci:go-lint",
  "ci:go-sec",
  "ci:go-vulncheck",
  "ci:semgrep",
  "ci:test",
]

# ==============================================================================
#  SBOM Tasks
# ==============================================================================
[tasks.sbom]
description = "Run full SBOM pipeline (generate, enrich, scan)"
depends = ["sbom:trivy", "sbom:grype"]
