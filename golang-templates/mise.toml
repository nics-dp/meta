[tools]
# Golang related
go = "1.26.1"
golangci-lint = "latest"
"aqua:securego/gosec" = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"

# Dockerfile lint
hadolint = "latest"

# SBOM generation
syft = "latest"
"go:github.com/snyk/parlay" = "latest"

# Deps vuln scanning
trivy = "latest"
grype = "latest"

# Static scanning
"pipx:semgrep" = "latest"
codeql = { version = "latest", bin_path = "codeql", platforms = """
[linux-x64]
asset_pattern = "codeql-linux64.zip"

[macos-arm64]
asset_pattern = "codeql-osx64.zip"

[macos-x64]
asset_pattern = "codeql-osx64.zip"

[windows-x64]
asset_pattern = "codeql-win64.zip"
""" }

# Docker Operation
docker-cli = "latest"
docker-compose = "latest"
"github:docker/buildx" = { version = "latest", bin = "buildx" }

# MISC
"github:hangxie/parquet-tools" = "latest"
bun = "latest"
duckdb = "latest"
gum = "latest"

# ------------------------------------------------------------------------------
[env]  # env for mise tasks
_.file = ".env"
GOEXPERIMENT_ARGS = "jsonv2,simd,runtimesecret,goroutineleakprofile"
CGO_LDFLAGS_ARGS = ""
CGO_CFLAGS_ARGS = ""
MAIN_GO_PATH = ""
BINARY_NAME = ""

# ------------------------------------------------------------------------------
[shell_alias]
# Docker Aliases - All Docker commands start with "d" AND Docker Compose commands start with "dc"
dstop = "docker stop $(sudo docker ps -a -q)"  # stop all running containers
dstopall = "docker stop $(sudo docker ps -aq)"  # stop all containers
drm = "docker rm $(sudo docker ps -a -q)"  # remove all containers
dprunevol = "docker volume prune"  # remove unused volumes
dprunesys = "docker system prune -a"  # remove unused docker data
ddelimages = "docker rmi $(sudo docker images -q)"  # remove unused docker images
derase = "dstop ; drm ; dprunevol ; dprunesys ; ddelimages"  # WARNING: removes everything!
dprune = "dprunevol ; dprunesys ; ddelimages"  # remove unused data, volumes, and images (perfect for safe clean up)
dexec = "docker exec -ti"  # usage: dexec container_name (to access container terminal)
dps = "docker ps -a"  # running docker processes
ddf = "docker system df"  # docker data usage (/var/lib/docker)
dlogs = 'docker logs -tf --tail="50" '  # usage: dlogs container_name

dcrun = "docker compose"
dclogs = 'dcrun logs -tf --tail="50" '  # usage: dclogs container_name
dcup = "dcrun up -d --build --remove-orphans"  # up the stack
dcdown = "dcrun down --remove-orphans"  # down the stack
dcrec = "dcrun up -d --force-recreate --remove-orphans"  # usage: dcrec container_name
dcstop = "dcrun stop"  # usage: dcstop container_name
dcrestart = "dcrun restart "  # usage: dcrestart container_name
dcstart = "dcrun start "  # usage: dcstart container_name
dcpull = "dcrun pull"  # usage: dcpull to pull all new images or dcpull container_name

# ------------------------------------------------------------------------------
# ==============================================================================
#  Compile Ruler
# ==============================================================================
[tasks.ruler]  # command: mise run ruler
description = "Compile ruler to AGENTS.md and CLAUDE.md"
run = "bunx @intellectronica/ruler apply"

# ==============================================================================
#  Git Submodules
# ==============================================================================

[tasks."gs:clone"]
description = "Clone git submodules"
raw = true
run = "git submodule update --init --recursive"

[tasks."gs:update"]
description = "Update git submodules"
raw = true
run = "git submodule update --remote --merge"

# ==============================================================================
#  Env init Tasks
# ==============================================================================
[tasks.init]
description = "Initialize Environment"
run = [{ task = "ruler" }, { task = "gs:clone" }, "go mod download"]

# ==============================================================================
#  Golang Tasks
# ==============================================================================
[tasks."go:mod"]
description = "Go modules (tidy/download/vendor)"
raw = true
run = '''
go mod tidy
go mod vendor
go mod download
'''

[tasks."go:build"]
description = "Building golang  binary"
raw = true
run = '''
echo "Building..."
CGO_LDFLAGS="$CGO_LDFLAGS_ARGS" CGO_CFLAGS="$CGO_CFLAGS_ARGS" GOEXPERIMENT="$GOEXPERIMENT_ARGS" go build -o bin/"$BINARY_NAME" "$MAIN_GO_PATH"
echo "Build completed!"
'''

[tasks."go:run"]
description = "Running golang script"
raw = true
run = '''
echo "Running..."
CGO_LDFLAGS="$CGO_LDFLAGS_ARGS" CGO_CFLAGS="$CGO_CFLAGS_ARGS" GOEXPERIMENT="$GOEXPERIMENT_ARGS" go run "$MAIN_GO_PATH"
'''

[tasks."go:upgrade"]
description = "Upgrading Golang dependencies"
run = '''
go get -u ./...
go mod tidy
go mod vendor
'''

[tasks."go:local"]
description = "Enable local replacements for libdcf and ZenQuery"
raw = true
run = [
  '''
echo "Enabling local replacements..."
go mod edit -replace=github.com/nics-dp/libdcf=../libdcf
go mod edit -replace=github.com/nics-dp/ZenQuery=../ZenQuery
go mod tidy
go mod vendor
echo "Local replacements enabled"
echo "go.mod now uses: ../libdcf, ../ZenQuery"
echo "Current replace directives:"
grep -E "^replace" go.mod || echo "(none)"
''',
  { task = "go:mod" }
]

[tasks."go:remote"]
description = "Disable local replacements (use remote dev)"
run = [
  '''
echo "Disabling local replacements..."
go mod edit -dropreplace=github.com/nics-dp/libdcf
go mod edit -droprequire=github.com/nics-dp/libdcf
go mod edit -dropreplace=github.com/nics-dp/ZenQuery
go mod edit -droprequire=github.com/nics-dp/ZenQuery
echo "Fetching remote dev branches..."
GOPRIVATE=github.com/nics-dp GOSUMDB=off go get github.com/nics-dp/libdcf@dev github.com/nics-dp/ZenQuery@dev
GOPRIVATE=github.com/nics-dp GOSUMDB=off go mod tidy
go mod vendor
echo "Local replacements disabled"
echo "go.mod now uses remote dev branches"
echo ""
echo "Current replace directives:"
grep -E "^replace" go.mod || echo "(none)"
''',
  { task = "go:mod" },
]

# ==============================================================================
#  Misc Tasks
# ==============================================================================

[tasks.clean]
description = "Cleanup leftovers"
run = '''
echo "Cleaning..."
rm -rf gosec-report.json
rm -rf coverage
go clean -testcache -cache
echo "Clean completed!"
'''

[tasks.all]
description = "Full Build Pipeline"
raw = true
run = [
  { task = "clean" },
  { tasks = ["gs:update", "go:upgrade"] },
  { tasks = ["go:build", "ci"] },
]

# ==============================================================================
#  CI Tasks
# ==============================================================================
[tasks."ci:commitlint"]
description = "Run commitlint on recent commits"
raw = true
run = "bunx commitlint --from HEAD~1 --to HEAD"

[tasks."ci:hadolint"]
description = "Lint Dockerfiles with hadolint"
raw = true
run = "hadolint Dockerfile*"

[tasks."ci:trivy-iac"]
description = "Run Trivy IaC scan on Dockerfiles and compose files"
raw = true
run = "trivy config --exit-code 0 ."

[tasks."ci:trivy-license"]
description = "Run Trivy license compliance check"
raw = true
run = "trivy fs --scanners license --exit-code 0 ."

[tasks."ci:go-lint"]
description = "Run golangci-lint"
raw = true
run = "golangci-lint run ./..."

[tasks."ci:go-sec"]
description = "Run gosec security scanner"
raw = true
run = "gosec -quiet ./..."

[tasks."ci:go-vulncheck"]
description = "Run govulncheck vulnerability check"
raw = true
run = "govulncheck ./..."

[tasks."ci:semgrep"]
description = "Run semgrep static analysis for Go"
raw = true
run = "semgrep scan --error --enable-nosem --config p/golang ."

[tasks."ci:test"]
description = "Run unit tests with coverage and generate report"
run = """
go test -race -coverprofile=coverage.out ./...
go tool cover -html=coverage.out -o coverage.html
go tool cover -func=coverage.out > coverage.md
"""

[tasks.ci]
description = "Run all CI checks"
depends = [
  "ci:commitlint",
  "ci:hadolint",
  "ci:trivy-iac",
  "ci:trivy-license",
  "ci:go-lint",
  "ci:go-sec",
  "ci:go-vulncheck",
  "ci:semgrep",
  "ci:test",
]

# ==============================================================================
#  SBOM Tasks
# ==============================================================================

[tasks.sbom]
description = "Run full SBOM pipeline (generate, enrich, scan)"
depends = ["sbom:trivy", "sbom:grype"]

[tasks."sbom:source"]
description = "Generate CycloneDX SBOM for source"
run = "syft scan . -o cyclonedx-json=sbom-source.cdx.json"

[tasks."sbom:enrich"]
description = "Enrich SBOM with ecosystem metadata"
depends = ["sbom:source"]
run = "parlay ecosystems enrich sbom-source.cdx.json > enriched-source.cdx.json"

[tasks."sbom:trivy"]
description = "Scan SBOM for vulnerabilities with Trivy"
raw = true
depends = ["sbom:enrich"]
run = "trivy sbom enriched-source.cdx.json"

[tasks."sbom:grype"]
description = "Scan SBOM for vulnerabilities with Grype"
raw = true
depends = ["sbom:enrich"]
run = "grype sbom:enriched-source.cdx.json"
